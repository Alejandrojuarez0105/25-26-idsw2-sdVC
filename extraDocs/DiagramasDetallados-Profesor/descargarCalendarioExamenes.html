<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Descargar Calendario Personal - Profesor</title>

  <style>
    *{
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body{
      background: #e9e9e9;
      font-family: "Courier New", monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .contenedor{
      width: 650px;
      background: #ececec;
      padding: 25px;
      border: 1px solid #cfcfcf;
    }

    .titulo{
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      text-decoration: underline;
      margin-bottom: 30px;
      letter-spacing: 1px;
    }

    .subtitulo{
      text-align: center;
      font-size: 14px;
      margin-bottom: 25px;
      color: #555;
    }

    .panel{
      border: 1px solid #cfcfcf;
      padding: 18px;
      margin-bottom: 25px;
      background: #ededed;
    }

    .panel h3{
      font-size: 18px;
      margin-bottom: 15px;
      text-decoration: underline;
      font-weight: bold;
    }

    /* Grupo de opciones */
    .grupo-opciones{
      margin-bottom: 20px;
    }

    .grupo-titulo{
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .opciones-lista{
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-left: 25px;
    }

    .opcion-radio{
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .opcion-radio input{
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .opcion-radio label{
      font-size: 15px;
      cursor: pointer;
    }

    /* Checkboxes */
    .opcion-checkbox{
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .opcion-checkbox input{
      width: 15px;
      height: 15px;
      cursor: pointer;
    }

    .opcion-checkbox label{
      font-size: 14px;
      cursor: pointer;
    }

    /* Rango de fechas personalizado */
    .rango-fechas{
      margin-left: 25px;
      margin-top: 10px;
      display: flex;
      gap: 15px;
      align-items: center;
      flex-wrap: wrap;
    }

    .campo-fecha{
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .campo-fecha label{
      font-size: 13px;
      font-weight: bold;
    }

    .campo-fecha input{
      padding: 5px 8px;
      font-family: inherit;
      font-size: 13px;
      border: 1px solid #bdbdbd;
      background: white;
    }

    .error-fechas{
      margin-left: 25px;
      margin-top: 8px;
      font-size: 12px;
      color: #dc3545;
      display: none;
    }

    hr{
      border: none;
      border-top: 2px solid #cfcfcf;
      margin: 20px 0;
    }

    .botones{
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
    }

    .btn{
      min-width: 180px;
      padding: 12px 20px;
      border-radius: 4px;
      font-size: 16px;
      font-family: inherit;
      cursor: pointer;
      border: 1px solid #999;
      font-weight: bold;
    }

    .btn-generar{
      background: #28a745;
      color: white;
      border: 1px solid #1e7e34;
    }

    .btn-generar:hover{
      background: #218838;
    }

    .btn-cancelar{
      background: #f3f0ec;
      color: black;
    }

    .btn-cancelar:hover{
      background: #e3dfda;
    }
  </style>
</head>

<body>

  <div class="contenedor">

    <h1 class="titulo">DESCARGAR CALENDARIO PERSONAL</h1>
    <div class="subtitulo">Dr. Manuel Masías - Departamento de Informática</div>

    <!-- Formato -->
    <div class="panel">
      <h3>📄 Formato:</h3>
      <div class="opciones-lista">
        <div class="opcion-radio">
          <input type="radio" name="formato" id="formatoPDF" value="pdf" checked>
          <label for="formatoPDF">PDF</label>
        </div>
        <div class="opcion-radio">
          <input type="radio" name="formato" id="formatoExcel" value="excel">
          <label for="formatoExcel">Excel</label>
        </div>
        <div class="opcion-radio">
          <input type="radio" name="formato" id="formatoDigital" value="digital">
          <label for="formatoDigital">Calendario digital (iCal/ICS)</label>
        </div>
      </div>
    </div>

    <!-- Período -->
    <div class="panel">
      <h3>📆 Período:</h3>
      <div class="opciones-lista">
        <div class="opcion-radio">
          <input type="radio" name="periodo" id="periodoProximos" value="proximos" checked>
          <label for="periodoProximos">Exámenes próximos (30 días)</label>
        </div>
        <div class="opcion-radio">
          <input type="radio" name="periodo" id="periodoTodos" value="todos">
          <label for="periodoTodos">Todos mis exámenes</label>
        </div>
        <div class="opcion-radio">
          <input type="radio" name="periodo" id="periodoPersonalizado" value="personalizado">
          <label for="periodoPersonalizado">Personalizado...</label>
        </div>
      </div>
      
      <!-- Rango de fechas personalizado -->
      <div id="rangoFechas" style="display: none;">
        <div class="rango-fechas">
          <div class="campo-fecha">
            <label>Desde:</label>
            <input type="date" id="fechaDesde" value="2025-01-13">
          </div>
          <div class="campo-fecha">
            <label>Hasta:</label>
            <input type="date" id="fechaHasta" value="2025-01-16">
          </div>
        </div>
        <div id="errorFechas" class="error-fechas">
          ⚠️ La fecha inicial debe ser menor o igual a la fecha final
        </div>
      </div>
    </div>

    <!-- Información a incluir -->
    <div class="panel">
      <h3>📋 Información a incluir:</h3>
      <div class="opciones-lista">
        <div class="opcion-checkbox">
          <input type="checkbox" id="chkDatosExamen" checked>
          <label for="chkDatosExamen">Datos del examen (fecha, hora, aula)</label>
        </div>
        <div class="opcion-checkbox">
          <input type="checkbox" id="chkAsignatura" checked>
          <label for="chkAsignatura">Asignatura y código</label>
        </div>
        <div class="opcion-checkbox">
          <input type="checkbox" id="chkEstudiantes" checked>
          <label for="chkEstudiantes">Estudiantes matriculados</label>
        </div>
        <div class="opcion-checkbox">
          <input type="checkbox" id="chkObservaciones">
          <label for="chkObservaciones">Observaciones personales</label>
        </div>
        <div class="opcion-checkbox">
          <input type="checkbox" id="chkContacto">
          <label for="chkContacto">Contacto de administración</label>
        </div>
      </div>
    </div>

    <div class="botones">
      <button class="btn btn-generar" id="btnGenerar">📎 Generar descarga</button>
      <button class="btn btn-cancelar" id="btnCancelar">❌ Cancelar</button>
    </div>

  </div>

  <script>
    // Elementos del DOM
    const btnGenerar = document.getElementById('btnGenerar');
    const btnCancelar = document.getElementById('btnCancelar');
    
    // Radios de período
    const periodoProximos = document.getElementById('periodoProximos');
    const periodoTodos = document.getElementById('periodoTodos');
    const periodoPersonalizado = document.getElementById('periodoPersonalizado');
    const rangoFechas = document.getElementById('rangoFechas');
    
    // Fechas personalizadas
    const fechaDesde = document.getElementById('fechaDesde');
    const fechaHasta = document.getElementById('fechaHasta');
    const errorFechas = document.getElementById('errorFechas');

    // Función para validar fechas
    function validarFechas() {
      if (!periodoPersonalizado.checked) {
        return true;
      }
      
      const desde = new Date(fechaDesde.value);
      const hasta = new Date(fechaHasta.value);
      
      if (desde > hasta) {
        errorFechas.style.display = 'block';
        return false;
      } else {
        errorFechas.style.display = 'none';
        return true;
      }
    }

    // Función para mostrar/ocultar el rango de fechas
    function toggleRangoFechas() {
      if (periodoPersonalizado.checked) {
        rangoFechas.style.display = 'block';
        validarFechas();
      } else {
        rangoFechas.style.display = 'none';
        errorFechas.style.display = 'none';
      }
    }

    // Eventos de los radios de período
    periodoProximos.addEventListener('change', toggleRangoFechas);
    periodoTodos.addEventListener('change', toggleRangoFechas);
    periodoPersonalizado.addEventListener('change', toggleRangoFechas);
    
    // Validar fechas cuando cambian
    fechaDesde.addEventListener('change', validarFechas);
    fechaHasta.addEventListener('change', validarFechas);

    // Obtener formato seleccionado
    function getFormatoSeleccionado() {
      if (document.getElementById('formatoPDF').checked) return 'PDF';
      if (document.getElementById('formatoExcel').checked) return 'Excel';
      if (document.getElementById('formatoDigital').checked) return 'Calendario digital (iCal/ICS)';
      return 'PDF';
    }

    // Obtener período seleccionado
    function getPeriodoSeleccionado() {
      if (periodoProximos.checked) return 'Exámenes próximos (30 días)';
      if (periodoTodos.checked) return 'Todos mis exámenes';
      if (periodoPersonalizado.checked) {
        return `Personalizado: ${fechaDesde.value} al ${fechaHasta.value}`;
      }
      return 'Exámenes próximos (30 días)';
    }

    // Obtener información a incluir
    function getInformacionIncluir() {
      const items = [];
      if (document.getElementById('chkDatosExamen').checked) items.push('Datos del examen');
      if (document.getElementById('chkAsignatura').checked) items.push('Asignatura y código');
      if (document.getElementById('chkEstudiantes').checked) items.push('Estudiantes matriculados');
      if (document.getElementById('chkObservaciones').checked) items.push('Observaciones personales');
      if (document.getElementById('chkContacto').checked) items.push('Contacto de administración');
      return items;
    }

    // Validar información seleccionada
    function validarInformacion() {
      const informacion = getInformacionIncluir();
      if (informacion.length === 0) {
        alert('⚠️ Debes seleccionar al menos un elemento de información para incluir en el calendario.');
        return false;
      }
      return true;
    }

    // Generar descarga
    function generarDescarga() {
      // Validar fechas si está seleccionado personalizado
      if (periodoPersonalizado.checked && !validarFechas()) {
        alert('⚠️ Error en el rango de fechas:\n\nLa fecha inicial debe ser menor o igual a la fecha final.\n\nPor favor, corrige las fechas seleccionadas.');
        return;
      }
      
      if (!validarInformacion()) return;
      
      const formato = getFormatoSeleccionado();
      const periodo = getPeriodoSeleccionado();
      const informacion = getInformacionIncluir();
      
      let mensaje = '📥 GENERANDO CALENDARIO PERSONAL\n\n';
      mensaje += `Profesor: Dr. Manuel Masías\n`;
      mensaje += `Formato: ${formato}\n`;
      mensaje += `Período: ${periodo}\n`;
      mensaje += `Información a incluir: ${informacion.length} elementos\n`;
      mensaje += `- ${informacion.join('\n- ')}\n\n`;
      mensaje += `✅ La descarga comenzará en breve.`;
      
      alert(mensaje);
      console.log('Descargando calendario profesor:', { formato, periodo, informacion });
    }

    // Cancelar
    function cancelar() {
      const confirmar = confirm('¿Estás seguro de que deseas cancelar la descarga?');
      if (confirmar) {
        alert('🔄 Descarga cancelada.');
      }
    }

    // Eventos
    btnGenerar.addEventListener('click', generarDescarga);
    btnCancelar.addEventListener('click', cancelar);
    
    // Inicializar
    toggleRangoFechas();
  </script>

</body>
</html>
