<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crear Nueva Asignatura</title>

  <style>
    *{
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body{
      background: #e9e9e9;
      font-family: "Courier New", monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .contenedor{
      width: 550px;
      background: #ececec;
      padding: 25px;
      border: 1px solid #cfcfcf;
    }

    .titulo{
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      text-decoration: underline;
      margin-bottom: 30px;
      letter-spacing: 1px;
    }

    .campo{
      margin-bottom: 20px;
    }

    .campo label{
      display: block;
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .campo input{
      width: 100%;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 16px;
      border: 1px solid #bdbdbd;
      background: white;
    }

    .campo select{
      width: 100%;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 16px;
      border: 1px solid #bdbdbd;
      background: white;
      cursor: pointer;
    }

    .campo input:focus,
    .campo select:focus{
      outline: none;
      border-color: #2d89ef;
    }

    .botones{
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }

    .btn{
      min-width: 150px;
      padding: 10px 20px;
      border-radius: 4px;
      font-size: 16px;
      font-family: inherit;
      cursor: pointer;
      border: 1px solid #999;
      font-weight: bold;
    }

    .btn-crear{
      background: #28a745;
      color: white;
      border: 1px solid #1e7e34;
    }

    .btn-crear:hover{
      background: #218838;
    }

    .btn-cancelar{
      background: #f3f0ec;
      color: black;
    }

    .btn-cancelar:hover{
      background: #e3dfda;
    }
  </style>
</head>

<body>

  <div class="contenedor">

    <h1 class="titulo">CREAR NUEVA ASIGNATURA</h1>

    <div class="campo">
      <label for="codigo">Código:</label>
      <input type="text" id="codigo" placeholder="Ej: IYA003, MAT101..." maxlength="20">
    </div>

    <div class="campo">
      <label for="nombre">Nombre:</label>
      <input type="text" id="nombre" placeholder="Ej: Programación I">
    </div>

    <div class="campo">
      <label for="creditos">Créditos:</label>
      <input type="number" id="creditos" placeholder="Ej: 6" min="1" max="12" step="1">
    </div>

    <div class="campo">
      <label for="grado">Grado:</label>
      <select id="grado">
        <option value="">-- Seleccionar grado --</option>
        <option value="GII">GII - Ingeniería Informática</option>
        <option value="GIOI">GIOI - Ingeniería Industrial</option>
        <option value="GPOI">GPOI - Psicología</option>
        <option value="GADE">GADE - Administración de Empresas</option>
        <option value="GIC">GIC - Ingeniería Civil</option>
      </select>
    </div>

    <div class="botones">
      <button class="btn btn-crear" id="btnCrear">Crear asignatura</button>
      <button class="btn btn-cancelar" id="btnCancelar">Cancelar</button>
    </div>

  </div>

  <script>
    // Grados disponibles (para validación)
    const gradosDisponibles = ['GII', 'GIOI', 'GPOI', 'GADE', 'GIC'];

    // Elementos del DOM
    const inputCodigo = document.getElementById('codigo');
    const inputNombre = document.getElementById('nombre');
    const inputCreditos = document.getElementById('creditos');
    const selectGrado = document.getElementById('grado');
    const btnCrear = document.getElementById('btnCrear');
    const btnCancelar = document.getElementById('btnCancelar');

    // Función para validar el código
    function validarCodigo(codigo) {
      if (!codigo || codigo.trim() === '') {
        alert('❌ El código es obligatorio.');
        return false;
      }
      
      if (codigo.trim().length < 3) {
        alert('❌ El código debe tener al menos 3 caracteres.');
        return false;
      }
      
      // Verificar que solo contenga letras mayúsculas, números y guiones
      const regex = /^[A-Z0-9-]+$/i;
      if (!regex.test(codigo.trim())) {
        alert('❌ El código solo puede contener letras, números y guiones.');
        return false;
      }
      
      return true;
    }

    // Función para validar el nombre
    function validarNombre(nombre) {
      if (!nombre || nombre.trim() === '') {
        alert('❌ El nombre es obligatorio.');
        return false;
      }
      
      if (nombre.trim().length < 3) {
        alert('❌ El nombre debe tener al menos 3 caracteres.');
        return false;
      }
      
      return true;
    }

    // Función para validar los créditos
    function validarCreditos(creditos) {
      if (!creditos || creditos === '') {
        alert('❌ Los créditos son obligatorios.');
        return false;
      }
      
      const creditosNum = parseInt(creditos);
      if (isNaN(creditosNum)) {
        alert('❌ Los créditos deben ser un número válido.');
        return false;
      }
      
      if (creditosNum < 1 || creditosNum > 12) {
        alert('❌ Los créditos deben estar entre 1 y 12.');
        return false;
      }
      
      return true;
    }

    // Función para validar el grado
    function validarGrado(grado) {
      if (!grado || grado === '') {
        alert('❌ Debe seleccionar un grado.');
        return false;
      }
      
      if (!gradosDisponibles.includes(grado)) {
        alert('❌ El grado seleccionado no es válido.');
        return false;
      }
      
      return true;
    }

    // Función para verificar si el código ya existe (simulado)
    function codigoExiste(codigo) {
      // Aquí se consultaría a la base de datos
      const asignaturasExistentes = ['IYA003', 'IYA023', 'IYA025', 'IY016'];
      return asignaturasExistentes.includes(codigo.trim().toUpperCase());
    }

    // Obtener nombre del grado seleccionado
    function getNombreGrado(gradoValue) {
      const option = Array.from(selectGrado.options).find(opt => opt.value === gradoValue);
      return option ? option.text : gradoValue;
    }

    // Función para crear la asignatura
    function crearAsignatura() {
      const codigo = inputCodigo.value;
      const nombre = inputNombre.value;
      const creditos = inputCreditos.value;
      const grado = selectGrado.value;
      
      // Validar código
      if (!validarCodigo(codigo)) {
        inputCodigo.focus();
        return;
      }
      
      // Validar nombre
      if (!validarNombre(nombre)) {
        inputNombre.focus();
        return;
      }
      
      // Validar créditos
      if (!validarCreditos(creditos)) {
        inputCreditos.focus();
        return;
      }
      
      // Validar grado
      if (!validarGrado(grado)) {
        selectGrado.focus();
        return;
      }
      
      const codigoUpper = codigo.trim().toUpperCase();
      
      // Verificar si el código ya existe
      if (codigoExiste(codigoUpper)) {
        alert(`❌ El código "${codigoUpper}" ya existe.\n\nPor favor, use un código diferente.`);
        inputCodigo.focus();
        return;
      }
      
      const creditosNum = parseInt(creditos);
      const nombreGrado = getNombreGrado(grado);
      
      // Confirmar creación
      const confirmar = confirm(`¿Desea crear la siguiente asignatura?\n\nCódigo: ${codigoUpper}\nNombre: ${nombre.trim()}\nCréditos: ${creditosNum}\nGrado: ${nombreGrado}`);
      
      if (confirmar) {
        // Aquí se guardaría en la base de datos
        alert(`✅ ¡Asignatura creada exitosamente!\n\nCódigo: ${codigoUpper}\nNombre: ${nombre.trim()}\nCréditos: ${creditosNum}\nGrado: ${nombreGrado}`);
        
        // Limpiar campos
        inputCodigo.value = '';
        inputNombre.value = '';
        inputCreditos.value = '';
        selectGrado.value = '';
        inputCodigo.focus();
      }
    }

    // Función para cancelar
    function cancelar() {
      const confirmar = confirm('¿Estás seguro de que deseas cancelar?\n\nLos datos ingresados se perderán.');
      if (confirmar) {
        // Limpiar campos
        inputCodigo.value = '';
        inputNombre.value = '';
        inputCreditos.value = '';
        selectGrado.value = '';
        alert('🔄 Operación cancelada.');
      }
    }

    // Eventos
    btnCrear.addEventListener('click', crearAsignatura);
    btnCancelar.addEventListener('click', cancelar);
    
    // Navegación con Enter
    inputCodigo.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        inputNombre.focus();
      }
    });
    
    inputNombre.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        inputCreditos.focus();
      }
    });
    
    inputCreditos.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        selectGrado.focus();
      }
    });
    
    selectGrado.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        crearAsignatura();
      }
    });
    
    // Enfocar el primer campo al cargar
    inputCodigo.focus();
  </script>

</body>
</html>
