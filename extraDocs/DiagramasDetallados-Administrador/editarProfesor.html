<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Editar Profesor</title>

  <style>
    *{
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body{
      background: #e9e9e9;
      font-family: "Courier New", monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .contenedor{
      width: 650px;
      background: #ececec;
      padding: 25px;
      border: 1px solid #cfcfcf;
    }

    .titulo{
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      text-decoration: underline;
      margin-bottom: 30px;
      letter-spacing: 1px;
    }

    .subtitulo{
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 20px;
      color: #555;
    }

    .campo{
      margin-bottom: 20px;
    }

    .campo label{
      display: block;
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .campo input{
      width: 100%;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 16px;
      border: 1px solid #bdbdbd;
      background: #f5f5f5;
    }

    .campo input:focus{
      outline: none;
      border-color: #2d89ef;
      background: white;
    }

    .campo select{
      width: 100%;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 16px;
      border: 1px solid #bdbdbd;
      background: #f5f5f5;
      cursor: pointer;
    }

    .campo select:focus{
      outline: none;
      border-color: #2d89ef;
      background: white;
    }

    .codigo-disabled{
      background: #e9ecef;
      color: #666;
      cursor: not-allowed;
    }

    /* Sección de asignaturas */
    .asignaturas-section{
      background: #f5f5f5;
      border: 1px solid #bdbdbd;
      padding: 15px;
      margin: 20px 0;
    }

    .asignaturas-titulo{
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 12px;
      text-decoration: underline;
    }

    .lista-asignaturas{
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 15px;
    }

    .asignatura-tag{
      background: #dfe7ef;
      padding: 5px 12px;
      border-radius: 15px;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .asignatura-tag button{
      background: none;
      border: none;
      color: #dc3545;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      padding: 0 3px;
    }

    .asignatura-tag button:hover{
      color: #a71d2a;
    }

    .agregar-asignatura{
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .agregar-asignatura select{
      flex: 1;
      background: white;
    }

    .btn-agregar{
      background: #28a745;
      color: white;
      border: none;
      padding: 8px 20px;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      border-radius: 3px;
    }

    .btn-agregar:hover{
      background: #218838;
    }

    .info-adicional{
      background: #e7f3ff;
      padding: 12px 15px;
      margin: 20px 0;
      border-left: 4px solid #2d89ef;
      font-size: 14px;
      color: #2c3e50;
    }

    hr{
      border: none;
      border-top: 2px solid #cfcfcf;
      margin: 25px 0 20px 0;
    }

    .botones{
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .btn{
      min-width: 150px;
      padding: 10px 20px;
      border-radius: 4px;
      font-size: 15px;
      font-family: inherit;
      cursor: pointer;
      border: 1px solid #999;
      font-weight: bold;
    }

    .btn-guardar{
      background: #28a745;
      color: white;
      border: 1px solid #1e7e34;
    }

    .btn-guardar:hover{
      background: #218838;
    }

    .btn-continuar{
      background: #2d89ef;
      color: white;
      border: 1px solid #1d5faa;
    }

    .btn-continuar:hover{
      background: #1e6bc7;
    }

    .btn-cancelar{
      background: #f3f0ec;
      color: black;
    }

    .btn-cancelar:hover{
      background: #e3dfda;
    }
  </style>
</head>

<body>

  <div class="contenedor">

    <h1 class="titulo">EDITAR PROFESOR</h1>

    <div class="subtitulo">📋 Datos del profesor:</div>

    <div class="campo">
      <label for="codigo">Código:</label>
      <input type="text" id="codigo" value="PRO001" class="codigo-disabled" readonly disabled>
    </div>

    <div class="campo">
      <label for="nombre">Nombre:</label>
      <input type="text" id="nombre" value="Manuel Masías">
    </div>

    <div class="campo">
      <label for="email">Email:</label>
      <input type="email" id="email" value="manuel.masias@uneatlantico.es">
    </div>

    <div class="campo">
      <label for="departamento">Departamento:</label>
      <select id="departamento">
        <option value="Informática" selected>Informática</option>
        <option value="Matemáticas">Matemáticas</option>
        <option value="Física">Física</option>
        <option value="Química">Química</option>
        <option value="Administración">Administración</option>
        <option value="Psicología">Psicología</option>
        <option value="Ingeniería Civil">Ingeniería Civil</option>
        <option value="Electrónica">Electrónica</option>
      </select>
    </div>

    <!-- Asignaturas impartidas -->
    <div class="asignaturas-section">
      <div class="asignaturas-titulo">📚 Asignaturas impartidas:</div>
      <div class="lista-asignaturas" id="listaAsignaturas">
        <span class="asignatura-tag">Programación I <button class="btn-eliminar-asignatura" data-asignatura="Programación I">✖</button></span>
        <span class="asignatura-tag">Ingeniería de Software I <button class="btn-eliminar-asignatura" data-asignatura="Ingeniería de Software I">✖</button></span>
        <span class="asignatura-tag">Estructuras de Datos I <button class="btn-eliminar-asignatura" data-asignatura="Estructuras de Datos I">✖</button></span>
      </div>
      <div class="agregar-asignatura">
        <select id="nuevaAsignatura">
          <option value="">-- Seleccionar asignatura --</option>
          <option value="Programación I">Programación I</option>
          <option value="Bases de Datos I">Bases de Datos I</option>
          <option value="Estructuras de Datos I">Estructuras de Datos I</option>
          <option value="Ingeniería de Software I">Ingeniería de Software I</option>
          <option value="Redes de Ordenadores">Redes de Ordenadores</option>
          <option value="Sistemas Operativos">Sistemas Operativos</option>
          <option value="Inteligencia Artificial">Inteligencia Artificial</option>
          <option value="Desarrollo Web">Desarrollo Web</option>
        </select>
        <button class="btn-agregar" id="btnAgregarAsignatura">+ Agregar</button>
      </div>
    </div>

    <div class="info-adicional">
      👨‍🏫 Profesor del departamento de Informática, especialista en desarrollo de software.
    </div>

    <hr>

    <div class="botones">
      <button class="btn btn-guardar" id="btnGuardar">💾 Guardar cambios</button>
      <button class="btn btn-continuar" id="btnContinuar">📌 Continuar editando</button>
      <button class="btn btn-cancelar" id="btnCancelar">❌ Cancelar</button>
    </div>

  </div>

  <script>
    // Elementos del DOM
    const inputCodigo = document.getElementById('codigo');
    const inputNombre = document.getElementById('nombre');
    const inputEmail = document.getElementById('email');
    const selectDepartamento = document.getElementById('departamento');
    const listaAsignaturas = document.getElementById('listaAsignaturas');
    const selectNuevaAsignatura = document.getElementById('nuevaAsignatura');
    const btnAgregarAsignatura = document.getElementById('btnAgregarAsignatura');
    const btnGuardar = document.getElementById('btnGuardar');
    const btnContinuar = document.getElementById('btnContinuar');
    const btnCancelar = document.getElementById('btnCancelar');

    // Datos originales (simulados)
    let asignaturasOriginales = ['Programación I', 'Ingeniería de Software I', 'Estructuras de Datos I'];
    let asignaturasActuales = [...asignaturasOriginales];

    const datosOriginales = {
      codigo: 'PRO001',
      nombre: 'Manuel Masías',
      email: 'manuel.masias@uneatlantico.es',
      departamento: 'Informática',
      asignaturas: [...asignaturasOriginales]
    };

    // Renderizar lista de asignaturas
    function renderizarAsignaturas() {
      listaAsignaturas.innerHTML = '';
      asignaturasActuales.forEach(asignatura => {
        const tag = document.createElement('span');
        tag.className = 'asignatura-tag';
        tag.innerHTML = `${asignatura} <button class="btn-eliminar-asignatura" data-asignatura="${asignatura}">✖</button>`;
        listaAsignaturas.appendChild(tag);
      });
      
      // Agregar event listeners a los botones eliminar
      document.querySelectorAll('.btn-eliminar-asignatura').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const asignatura = btn.getAttribute('data-asignatura');
          eliminarAsignatura(asignatura);
        });
      });
    }

    // Agregar asignatura
    function agregarAsignatura() {
      const nuevaAsignatura = selectNuevaAsignatura.value;
      if (!nuevaAsignatura) {
        alert('⚠️ Seleccione una asignatura para agregar.');
        return;
      }
      
      if (asignaturasActuales.includes(nuevaAsignatura)) {
        alert(`⚠️ La asignatura "${nuevaAsignatura}" ya está en la lista.`);
        return;
      }
      
      asignaturasActuales.push(nuevaAsignatura);
      renderizarAsignaturas();
      selectNuevaAsignatura.value = '';
    }

    // Eliminar asignatura
    function eliminarAsignatura(asignatura) {
      const index = asignaturasActuales.indexOf(asignatura);
      if (index !== -1) {
        asignaturasActuales.splice(index, 1);
        renderizarAsignaturas();
      }
    }

    // Verificar si hay cambios
    function hayCambios() {
      const nombreActual = inputNombre.value.trim();
      const emailActual = inputEmail.value.trim();
      const deptoActual = selectDepartamento.value;
      
      // Comparar asignaturas (orden no importa)
      const asignaturasIguales = asignaturasActuales.length === asignaturasOriginales.length &&
        asignaturasActuales.every(a => asignaturasOriginales.includes(a));
      
      return nombreActual !== datosOriginales.nombre ||
             emailActual !== datosOriginales.email ||
             deptoActual !== datosOriginales.departamento ||
             !asignaturasIguales;
    }

    // Obtener datos actuales
    function getDatosActuales() {
      return {
        codigo: inputCodigo.value,
        nombre: inputNombre.value.trim(),
        email: inputEmail.value.trim(),
        departamento: selectDepartamento.value,
        asignaturas: [...asignaturasActuales]
      };
    }

    // Validar nombre
    function validarNombre(nombre) {
      if (!nombre || nombre === '') {
        alert('❌ El nombre no puede estar vacío.');
        return false;
      }
      
      if (nombre.length < 3) {
        alert('❌ El nombre debe tener al menos 3 caracteres.');
        return false;
      }
      
      return true;
    }

    // Validar email
    function validarEmail(email) {
      if (!email || email === '') {
        alert('❌ El email no puede estar vacío.');
        return false;
      }
      
      const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!regex.test(email)) {
        alert('❌ El email no es válido.');
        return false;
      }
      
      return true;
    }

    // Guardar cambios
    function guardarCambios() {
      const nombre = inputNombre.value;
      const email = inputEmail.value;
      
      if (!validarNombre(nombre)) {
        inputNombre.focus();
        return;
      }
      
      if (!validarEmail(email)) {
        inputEmail.focus();
        return;
      }
      
      if (!hayCambios()) {
        alert('ℹ️ No se detectaron cambios para guardar.');
        return;
      }
      
      const datosActuales = getDatosActuales();
      
      let mensajeConfirmacion = `¿Guardar los cambios del profesor "${datosOriginales.codigo}"?\n\n`;
      mensajeConfirmacion += `Nombre: ${datosActuales.nombre}\n`;
      mensajeConfirmacion += `Email: ${datosActuales.email}\n`;
      mensajeConfirmacion += `Departamento: ${datosActuales.departamento}\n`;
      mensajeConfirmacion += `Asignaturas (${datosActuales.asignaturas.length}):\n`;
      mensajeConfirmacion += `- ${datosActuales.asignaturas.join('\n- ')}`;
      
      const confirmar = confirm(mensajeConfirmacion);
      
      if (confirmar) {
        // Actualizar datos originales
        datosOriginales.nombre = datosActuales.nombre;
        datosOriginales.email = datosActuales.email;
        datosOriginales.departamento = datosActuales.departamento;
        asignaturasOriginales = [...datosActuales.asignaturas];
        
        alert(`✅ Cambios guardados exitosamente.\n\nProfesor: ${datosOriginales.codigo}\nNombre: ${datosOriginales.nombre}`);
      }
    }

    // Continuar editando
    function continuarEditando() {
      if (hayCambios()) {
        alert('📌 Continuando con la edición...\n\nLos cambios no guardados se mantendrán en el formulario.');
      } else {
        alert('📌 No hay cambios pendientes. Puede seguir editando el profesor.');
      }
    }

    // Cancelar
    function cancelar() {
      if (hayCambios()) {
        const confirmar = confirm('⚠️ Hay cambios sin guardar.\n\n¿Estás seguro de que deseas cancelar? Los cambios se perderán.');
        if (confirmar) {
          // Restaurar valores originales
          inputNombre.value = datosOriginales.nombre;
          inputEmail.value = datosOriginales.email;
          selectDepartamento.value = datosOriginales.departamento;
          asignaturasActuales = [...asignaturasOriginales];
          renderizarAsignaturas();
          alert('🔄 Edición cancelada. Los datos han sido restaurados.');
        }
      } else {
        const confirmar = confirm('¿Estás seguro de que deseas salir del editor?');
        if (confirmar) {
          alert('👋 Saliendo del editor de profesores...');
        }
      }
    }

    // Eventos
    btnGuardar.addEventListener('click', guardarCambios);
    btnContinuar.addEventListener('click', continuarEditando);
    btnCancelar.addEventListener('click', cancelar);
    btnAgregarAsignatura.addEventListener('click', agregarAsignatura);
    
    // Enfocar el primer campo editable
    inputNombre.focus();
    
    // Inicializar
    renderizarAsignaturas();
  </script>

</body>
</html>
