<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Administración de Aulas</title>

  <style>
    *{
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body{
      background: #e9e9e9;
      font-family: "Courier New", monospace;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .contenedor{
      width: 1300px;
      background: #ececec;
      padding: 20px;
    }

    .titulo{
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      text-decoration: underline;
      margin-bottom: 25px;
      letter-spacing: 1px;
    }

    /* Tabla de aulas */
    .tabla-aulas{
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 25px;
      background: white;
    }

    .tabla-aulas th,
    .tabla-aulas td{
      border: 1px solid #bdbdbd;
      padding: 10px 8px;
      text-align: left;
    }

    .tabla-aulas th{
      background: #dfe7ef;
      font-weight: bold;
      font-size: 13px;
    }

    .tabla-aulas td{
      font-size: 12px;
    }

    .tabla-aulas tr{
      transition: background 0.2s;
    }

    .tabla-aulas tr:hover{
      background: #f0f0f0;
    }

    .tabla-aulas tr.seleccionado{
      background: #b8d4f0;
    }

    .btn-editar{
      background: #2d89ef;
      color: white;
      border: none;
      padding: 5px 15px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      border-radius: 3px;
    }

    .btn-editar:hover{
      background: #1e6bc7;
    }

    /* Checkbox de selección */
    .checkbox-aula{
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    /* Fila de búsqueda */
    .fila-busqueda{
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 15px;
      margin-bottom: 25px;
    }

    .label-buscar{
      font-size: 16px;
      font-weight: bold;
    }

    .input-buscar{
      padding: 8px 12px;
      font-family: inherit;
      font-size: 14px;
      border: 1px solid #bdbdbd;
      background: white;
      width: 250px;
    }

    .btn-filtrar{
      background: #2d89ef;
      color: white;
      border: none;
      padding: 8px 20px;
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
      border-radius: 3px;
    }

    .btn-filtrar:hover{
      background: #1e6bc7;
    }

    /* Botones de acción */
    .botones-accion{
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 25px;
      flex-wrap: wrap;
    }

    .btn{
      min-width: 180px;
      padding: 12px 20px;
      border-radius: 4px;
      font-size: 15px;
      font-family: inherit;
      cursor: pointer;
      border: 1px solid #999;
      font-weight: bold;
    }

    .btn-crear{
      background: #28a745;
      color: white;
      border: 1px solid #1e7e34;
    }

    .btn-crear:hover{
      background: #218838;
    }

    .btn-importar{
      background: #2d89ef;
      color: white;
      border: 1px solid #1d5faa;
    }

    .btn-importar:hover{
      background: #1e6bc7;
    }

    .btn-eliminar{
      background: #dc3545;
      color: white;
      border: 1px solid #a71d2a;
    }

    .btn-eliminar:hover{
      background: #c82333;
    }

    .btn-salir{
      background: #f3f0ec;
      color: black;
    }

    .btn-salir:hover{
      background: #e3dfda;
    }
  </style>
</head>

<body>

  <div class="contenedor">

    <h1 class="titulo">ADMINISTRACIÓN DE AULAS</h1>

    <!-- Tabla de aulas -->
    <table class="tabla-aulas" id="tablaAulas">
      <thead>
        <tr>
          <th style="width: 40px;"><input type="checkbox" id="chkSeleccionarTodos"></th>
          <th>CÓDIGO</th>
          <th>NOMBRE</th>
          <th>EDIFICIO</th>
          <th style="width: 70px;">CAPACIDAD</th>
          <th>TIPO</th>
          <th>RECURSOS</th>
          <th style="width: 100px;">ACCIÓN</th>
        </tr>
      </thead>
      <tbody id="cuerpoTabla">
        <!-- Datos dinámicos -->
      </tbody>
    </table>

    <!-- Fila de búsqueda -->
    <div class="fila-busqueda">
      <span class="label-buscar">🔍 BUSCAR:</span>
      <input type="text" id="inputBuscar" class="input-buscar" placeholder="Código, nombre o edificio...">
      <button class="btn-filtrar" id="btnFiltrar">Filtrar</button>
    </div>

    <!-- Botones de acción -->
    <div class="botones-accion">
      <button class="btn btn-crear" id="btnCrear">➕ Crear nueva</button>
      <button class="btn btn-importar" id="btnImportar">📎 Importar aulas</button>
      <button class="btn btn-eliminar" id="btnEliminar">🗑️ Eliminar seleccionada</button>
      <button class="btn btn-salir" id="btnSalir">🚪 Salir</button>
    </div>

  </div>

  <script>
    // Datos de aulas
    let aulas = [
      { id: 1, codigo: 'A-101', nombre: 'Aula -2.6', edificio: 'Edif. A', capacidad: 50, tipo: 'Práctica', recursos: 'Proyector, PC', seleccionado: false },
      { id: 2, codigo: 'A-102', nombre: 'Aula -2.4', edificio: 'Edif. A', capacidad: 40, tipo: 'Teoría', recursos: 'Ordenadores', seleccionado: false },
      { id: 3, codigo: 'B-201', nombre: 'Aula 1.2', edificio: 'Edif. B', capacidad: 45, tipo: 'Práctica', recursos: 'Proyector', seleccionado: false },
      { id: 4, codigo: 'C-301', nombre: 'Aula 1.1', edificio: 'Edif. B', capacidad: 60, tipo: 'Teoría', recursos: 'Pizarra', seleccionado: false }
    ];

    let aulasOriginales = JSON.parse(JSON.stringify(aulas));
    let filtroActivo = '';

    // Tipos de aula disponibles
    const tiposAula = ['Teoría', 'Práctica', 'Laboratorio', 'Seminario'];
    const edificiosDisponibles = ['Edif. A', 'Edif. B', 'Edif. C', 'Edif. D'];

    // Elementos del DOM
    const cuerpoTabla = document.getElementById('cuerpoTabla');
    const chkSeleccionarTodos = document.getElementById('chkSeleccionarTodos');
    const inputBuscar = document.getElementById('inputBuscar');
    const btnFiltrar = document.getElementById('btnFiltrar');

    // Función para renderizar la tabla
    function renderizarTabla() {
      cuerpoTabla.innerHTML = '';
      
      let aulasMostrar = aulas;
      if (filtroActivo) {
        const filtroLower = filtroActivo.toLowerCase();
        aulasMostrar = aulas.filter(aula => 
          aula.codigo.toLowerCase().includes(filtroLower) || 
          aula.nombre.toLowerCase().includes(filtroLower) ||
          aula.edificio.toLowerCase().includes(filtroLower)
        );
      }
      
      if (aulasMostrar.length === 0) {
        const fila = document.createElement('tr');
        fila.innerHTML = `<td colspan="8" style="text-align: center;">No hay aulas disponibles</td>`;
        cuerpoTabla.appendChild(fila);
        return;
      }
      
      aulasMostrar.forEach(aula => {
        const fila = document.createElement('tr');
        if (aula.seleccionado) {
          fila.classList.add('seleccionado');
        }
        
        fila.innerHTML = `
          <td style="text-align: center;">
            <input type="checkbox" class="checkbox-aula" data-id="${aula.id}" ${aula.seleccionado ? 'checked' : ''}>
          </td>
          <td><strong>${aula.codigo}</strong></td>
          <td>${aula.nombre}</td>
          <td>${aula.edificio}</td>
          <td>${aula.capacidad}</td>
          <td>${aula.tipo}</td>
          <td>${aula.recursos}</td>
          <td>
            <button class="btn-editar" data-id="${aula.id}">Editar</button>
          </td>
        `;
        
        cuerpoTabla.appendChild(fila);
      });
      
      // Agregar event listeners a los checkboxes
      document.querySelectorAll('.checkbox-aula').forEach(chk => {
        chk.addEventListener('change', (e) => {
          const id = parseInt(e.target.getAttribute('data-id'));
          const aula = aulas.find(a => a.id === id);
          if (aula) {
            aula.seleccionado = e.target.checked;
            actualizarSeleccionarTodos();
            renderizarTabla();
          }
        });
      });
      
      // Agregar event listeners a los botones editar
      document.querySelectorAll('.btn-editar').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = parseInt(e.target.getAttribute('data-id'));
          editarAula(id);
        });
      });
    }
    
    // Actualizar checkbox "Seleccionar todos"
    function actualizarSeleccionarTodos() {
      const aulasFiltradas = filtroActivo ? 
        aulas.filter(a => 
          a.codigo.toLowerCase().includes(filtroActivo.toLowerCase()) || 
          a.nombre.toLowerCase().includes(filtroActivo.toLowerCase()) ||
          a.edificio.toLowerCase().includes(filtroActivo.toLowerCase())
        ) : aulas;
      
      const todosSeleccionados = aulasFiltradas.length > 0 && aulasFiltradas.every(a => a.seleccionado);
      chkSeleccionarTodos.checked = todosSeleccionados;
    }
    
    // Seleccionar/Deseleccionar todos
    function seleccionarTodos() {
      const seleccionar = chkSeleccionarTodos.checked;
      
      let aulasAAfectar = aulas;
      if (filtroActivo) {
        const filtroLower = filtroActivo.toLowerCase();
        aulasAAfectar = aulas.filter(a => 
          a.codigo.toLowerCase().includes(filtroLower) || 
          a.nombre.toLowerCase().includes(filtroLower) ||
          a.edificio.toLowerCase().includes(filtroLower)
        );
      }
      
      aulasAAfectar.forEach(aula => {
        aula.seleccionado = seleccionar;
      });
      
      renderizarTabla();
    }
    
    // Editar aula
    function editarAula(id) {
      const aula = aulas.find(a => a.id === id);
      if (aula) {
        let mensaje = '✏️ EDITAR AULA\n\n';
        mensaje += `Código: ${aula.codigo}\n\n`;
        mensaje += `Deja en blanco los campos que no quieras modificar.\n\n`;
        
        const nuevoNombre = prompt(mensaje + 'Nuevo nombre:', aula.nombre);
        if (nuevoNombre && nuevoNombre.trim()) {
          aula.nombre = nuevoNombre.trim();
        }
        
        const nuevoEdificio = prompt('Nuevo edificio (Edif. A, Edif. B, Edif. C, Edif. D):', aula.edificio);
        if (nuevoEdificio && nuevoEdificio.trim() && edificiosDisponibles.includes(nuevoEdificio.trim())) {
          aula.edificio = nuevoEdificio.trim();
        } else if (nuevoEdificio && nuevoEdificio.trim()) {
          alert(`⚠️ Edificio no reconocido. Se mantiene: ${aula.edificio}`);
        }
        
        const nuevaCapacidad = prompt('Nueva capacidad (número):', aula.capacidad);
        if (nuevaCapacidad && !isNaN(parseInt(nuevaCapacidad)) && parseInt(nuevaCapacidad) > 0) {
          aula.capacidad = parseInt(nuevaCapacidad);
        }
        
        const nuevoTipo = prompt('Nuevo tipo (Teoría, Práctica, Laboratorio, Seminario):', aula.tipo);
        if (nuevoTipo && nuevoTipo.trim() && tiposAula.includes(nuevoTipo.trim())) {
          aula.tipo = nuevoTipo.trim();
        } else if (nuevoTipo && nuevoTipo.trim()) {
          alert(`⚠️ Tipo no reconocido. Se mantiene: ${aula.tipo}`);
        }
        
        const nuevosRecursos = prompt('Nuevos recursos (separados por coma):', aula.recursos);
        if (nuevosRecursos && nuevosRecursos.trim()) {
          aula.recursos = nuevosRecursos.trim();
        }
        
        renderizarTabla();
        alert(`✅ Aula "${aula.codigo} - ${aula.nombre}" actualizada correctamente.`);
      }
    }
    
    // Filtrar aulas
    function filtrarAulas() {
      filtroActivo = inputBuscar.value.trim();
      // Limpiar selecciones al filtrar
      aulas.forEach(a => a.seleccionado = false);
      chkSeleccionarTodos.checked = false;
      renderizarTabla();
      
      if (filtroActivo) {
        const resultados = aulas.filter(a => 
          a.codigo.toLowerCase().includes(filtroActivo.toLowerCase()) || 
          a.nombre.toLowerCase().includes(filtroActivo.toLowerCase()) ||
          a.edificio.toLowerCase().includes(filtroActivo.toLowerCase())
        );
        alert(`🔍 Filtro aplicado: "${filtroActivo}"\n\nSe encontraron ${resultados.length} resultado(s).`);
      }
    }
    
    // Crear nueva aula
    function crearNueva() {
      const nuevoCodigo = prompt('Ingrese el código de la nueva aula (ej: D-401):');
      if (!nuevoCodigo || !nuevoCodigo.trim()) return;
      
      // Verificar si el código ya existe
      if (aulas.some(a => a.codigo.toLowerCase() === nuevoCodigo.trim().toLowerCase())) {
        alert(`❌ El código "${nuevoCodigo}" ya existe. Por favor, use otro código.`);
        return;
      }
      
      const nuevoNombre = prompt('Ingrese el nombre del aula:');
      if (!nuevoNombre || !nuevoNombre.trim()) return;
      
      const nuevoEdificio = prompt('Ingrese el edificio (Edif. A, Edif. B, Edif. C, Edif. D):');
      if (!nuevoEdificio || !nuevoEdificio.trim()) return;
      
      const edificioValidado = nuevoEdificio.trim();
      if (!edificiosDisponibles.includes(edificioValidado)) {
        alert(`⚠️ Edificio no válido. Usando "${edificiosDisponibles[0]}" como predeterminado.`);
      }
      
      const nuevaCapacidad = prompt('Ingrese la capacidad (número):');
      if (!nuevaCapacidad || isNaN(parseInt(nuevaCapacidad)) || parseInt(nuevaCapacidad) <= 0) {
        alert('❌ La capacidad debe ser un número entero positivo.');
        return;
      }
      
      const nuevoTipo = prompt('Ingrese el tipo (Teoría, Práctica, Laboratorio, Seminario):');
      if (!nuevoTipo || !nuevoTipo.trim()) return;
      
      const tipoValidado = nuevoTipo.trim();
      if (!tiposAula.includes(tipoValidado)) {
        alert(`⚠️ Tipo no válido. Usando "${tiposAula[0]}" como predeterminado.`);
      }
      
      const nuevosRecursos = prompt('Ingrese los recursos (ej: Proyector, Pizarra, Ordenadores):');
      if (!nuevosRecursos || !nuevosRecursos.trim()) return;
      
      const nuevoId = Math.max(...aulas.map(a => a.id), 0) + 1;
      
      aulas.push({
        id: nuevoId,
        codigo: nuevoCodigo.trim().toUpperCase(),
        nombre: nuevoNombre.trim(),
        edificio: edificiosDisponibles.includes(edificioValidado) ? edificioValidado : edificiosDisponibles[0],
        capacidad: parseInt(nuevaCapacidad),
        tipo: tiposAula.includes(tipoValidado) ? tipoValidado : tiposAula[0],
        recursos: nuevosRecursos.trim(),
        seleccionado: false
      });
      
      aulasOriginales = JSON.parse(JSON.stringify(aulas));
      renderizarTabla();
      alert(`✅ Aula "${nuevoCodigo} - ${nuevoNombre}" creada correctamente.`);
    }
    
    // Importar aulas
    function importarAulas() {
      alert('📎 Función de importación de aulas\n\nSe abrirá el asistente para importar aulas desde archivo CSV o Excel.');
    }
    
    // Eliminar seleccionada
    function eliminarSeleccionada() {
      const seleccionadas = aulas.filter(a => a.seleccionado);
      
      if (seleccionadas.length === 0) {
        alert('⚠️ No hay ninguna aula seleccionada para eliminar.');
        return;
      }
      
      let mensaje = '¿Estás seguro de que deseas eliminar las siguientes aulas?\n\n';
      seleccionadas.forEach(a => {
        mensaje += `• ${a.codigo} - ${a.nombre}\n`;
        mensaje += `  ${a.edificio} (Capacidad: ${a.capacidad})\n`;
      });
      mensaje += `\n⚠️ Esta acción no se puede deshacer.`;
      
      const confirmar = confirm(mensaje);
      if (confirmar) {
        aulas = aulas.filter(a => !a.seleccionado);
        aulasOriginales = JSON.parse(JSON.stringify(aulas));
        chkSeleccionarTodos.checked = false;
        renderizarTabla();
        alert(`✅ ${seleccionadas.length} aula(s) eliminada(s) correctamente.`);
      }
    }
    
    // Salir
    function salir() {
      const confirmar = confirm('¿Estás seguro de que deseas salir?');
      if (confirmar) {
        alert('👋 Saliendo del administrador de aulas...');
      }
    }
    
    // Eventos
    chkSeleccionarTodos.addEventListener('change', seleccionarTodos);
    btnFiltrar.addEventListener('click', filtrarAulas);
    document.getElementById('btnCrear').addEventListener('click', crearNueva);
    document.getElementById('btnImportar').addEventListener('click', importarAulas);
    document.getElementById('btnEliminar').addEventListener('click', eliminarSeleccionada);
    document.getElementById('btnSalir').addEventListener('click', salir);
    
    // Permitir filtrar con Enter
    inputBuscar.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        filtrarAulas();
      }
    });
    
    // Inicializar
    renderizarTabla();
  </script>

</body>
</html>
