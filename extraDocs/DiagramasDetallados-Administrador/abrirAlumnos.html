<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Administración de Alumnos</title>

  <style>
    *{
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body{
      background: #e9e9e9;
      font-family: "Courier New", monospace;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .contenedor{
      width: 1200px;
      background: #ececec;
      padding: 20px;
    }

    .titulo{
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      text-decoration: underline;
      margin-bottom: 25px;
      letter-spacing: 1px;
    }

    /* Tabla de alumnos */
    .tabla-alumnos{
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 25px;
      background: white;
    }

    .tabla-alumnos th,
    .tabla-alumnos td{
      border: 1px solid #bdbdbd;
      padding: 10px 8px;
      text-align: left;
    }

    .tabla-alumnos th{
      background: #dfe7ef;
      font-weight: bold;
      font-size: 14px;
    }

    .tabla-alumnos td{
      font-size: 13px;
    }

    .tabla-alumnos tr{
      transition: background 0.2s;
    }

    .tabla-alumnos tr:hover{
      background: #f0f0f0;
    }

    .tabla-alumnos tr.seleccionado{
      background: #b8d4f0;
    }

    .btn-editar{
      background: #2d89ef;
      color: white;
      border: none;
      padding: 5px 15px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      border-radius: 3px;
    }

    .btn-editar:hover{
      background: #1e6bc7;
    }

    /* Checkbox de selección */
    .checkbox-alumno{
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    /* Fila de búsqueda */
    .fila-busqueda{
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 15px;
      margin-bottom: 25px;
    }

    .label-buscar{
      font-size: 16px;
      font-weight: bold;
    }

    .input-buscar{
      padding: 8px 12px;
      font-family: inherit;
      font-size: 14px;
      border: 1px solid #bdbdbd;
      background: white;
      width: 250px;
    }

    .btn-filtrar{
      background: #2d89ef;
      color: white;
      border: none;
      padding: 8px 20px;
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
      border-radius: 3px;
    }

    .btn-filtrar:hover{
      background: #1e6bc7;
    }

    /* Botones de acción */
    .botones-accion{
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 25px;
      flex-wrap: wrap;
    }

    .btn{
      min-width: 180px;
      padding: 12px 20px;
      border-radius: 4px;
      font-size: 15px;
      font-family: inherit;
      cursor: pointer;
      border: 1px solid #999;
      font-weight: bold;
    }

    .btn-crear{
      background: #28a745;
      color: white;
      border: 1px solid #1e7e34;
    }

    .btn-crear:hover{
      background: #218838;
    }

    .btn-importar{
      background: #2d89ef;
      color: white;
      border: 1px solid #1d5faa;
    }

    .btn-importar:hover{
      background: #1e6bc7;
    }

    .btn-eliminar{
      background: #dc3545;
      color: white;
      border: 1px solid #a71d2a;
    }

    .btn-eliminar:hover{
      background: #c82333;
    }

    .btn-salir{
      background: #f3f0ec;
      color: black;
    }

    .btn-salir:hover{
      background: #e3dfda;
    }
  </style>
</head>

<body>

  <div class="contenedor">

    <h1 class="titulo">ADMINISTRACIÓN DE ALUMNOS</h1>

    <!-- Tabla de alumnos -->
    <table class="tabla-alumnos" id="tablaAlumnos">
      <thead>
        <tr>
          <th style="width: 40px;"><input type="checkbox" id="chkSeleccionarTodos"></th>
          <th>MATRÍCULA</th>
          <th>NOMBRE</th>
          <th>EMAIL</th>
          <th>GRADO</th>
          <th>CURSO</th>
          <th style="width: 100px;">ACCIÓN</th>
        </tr>
      </thead>
      <tbody id="cuerpoTabla">
        <!-- Datos dinámicos -->
      </tbody>
    </table>

    <!-- Fila de búsqueda -->
    <div class="fila-busqueda">
      <span class="label-buscar">🔍 BUSCAR:</span>
      <input type="text" id="inputBuscar" class="input-buscar" placeholder="Matrícula, nombre o email...">
      <button class="btn-filtrar" id="btnFiltrar">Filtrar</button>
    </div>

    <!-- Botones de acción -->
    <div class="botones-accion">
      <button class="btn btn-crear" id="btnCrear">➕ Crear nuevo</button>
      <button class="btn btn-importar" id="btnImportar">📎 Importar alumnos</button>
      <button class="btn btn-eliminar" id="btnEliminar">🗑️ Eliminar seleccionado</button>
      <button class="btn btn-salir" id="btnSalir">🚪 Salir</button>
    </div>

  </div>

  <script>
    // Datos de grados disponibles
    const gradosDisponibles = ['GII', 'GIOI', 'GPOI', 'GADE', 'GIC'];

    // Datos de cursos disponibles
    const cursosDisponibles = ['1°', '2°', '3°', '4°'];

    // Datos de alumnos
    let alumnos = [
      { id: 1, matricula: 'AL001234', nombre: 'Ana García López', email: 'ana.garcia@alumnos.uneatlantico.es', grado: 'GII', curso: '3°', seleccionado: false },
      { id: 2, matricula: 'AL002345', nombre: 'Carlos Martín Ruiz', email: 'carlos.martin@alumnos.uneatlantico.es', grado: 'GIOI', curso: '2°', seleccionado: false },
      { id: 3, matricula: 'AL003456', nombre: 'Laura Sánchez Pérez', email: 'laura.sanchez@alumnos.uneatlantico.es', grado: 'GII', curso: '1°', seleccionado: false },
      { id: 4, matricula: 'AL004567', nombre: 'Pedro Jiménez González', email: 'pedro.jimenez@alumnos.uneatlantico.es', grado: 'GIC', curso: '4°', seleccionado: false }
    ];

    let alumnosOriginales = JSON.parse(JSON.stringify(alumnos));
    let filtroActivo = '';

    // Elementos del DOM
    const cuerpoTabla = document.getElementById('cuerpoTabla');
    const chkSeleccionarTodos = document.getElementById('chkSeleccionarTodos');
    const inputBuscar = document.getElementById('inputBuscar');
    const btnFiltrar = document.getElementById('btnFiltrar');

    // Función para renderizar la tabla
    function renderizarTabla() {
      cuerpoTabla.innerHTML = '';
      
      let alumnosMostrar = alumnos;
      if (filtroActivo) {
        const filtroLower = filtroActivo.toLowerCase();
        alumnosMostrar = alumnos.filter(alumno => 
          alumno.matricula.toLowerCase().includes(filtroLower) || 
          alumno.nombre.toLowerCase().includes(filtroLower) ||
          alumno.email.toLowerCase().includes(filtroLower)
        );
      }
      
      if (alumnosMostrar.length === 0) {
        const fila = document.createElement('tr');
        fila.innerHTML = `<td colspan="7" style="text-align: center;">No hay alumnos disponibles</td>`;
        cuerpoTabla.appendChild(fila);
        return;
      }
      
      alumnosMostrar.forEach(alumno => {
        const fila = document.createElement('tr');
        if (alumno.seleccionado) {
          fila.classList.add('seleccionado');
        }
        
        fila.innerHTML = `
          <td style="text-align: center;">
            <input type="checkbox" class="checkbox-alumno" data-id="${alumno.id}" ${alumno.seleccionado ? 'checked' : ''}>
          </td>
          <td><strong>${alumno.matricula}</strong></td>
          <td>${alumno.nombre}</td>
          <td>${alumno.email}</td>
          <td>${alumno.grado}</td>
          <td>${alumno.curso}</td>
          <td>
            <button class="btn-editar" data-id="${alumno.id}">Editar</button>
          </td>
        `;
        
        cuerpoTabla.appendChild(fila);
      });
      
      // Agregar event listeners a los checkboxes
      document.querySelectorAll('.checkbox-alumno').forEach(chk => {
        chk.addEventListener('change', (e) => {
          const id = parseInt(e.target.getAttribute('data-id'));
          const alumno = alumnos.find(a => a.id === id);
          if (alumno) {
            alumno.seleccionado = e.target.checked;
            actualizarSeleccionarTodos();
            renderizarTabla();
          }
        });
      });
      
      // Agregar event listeners a los botones editar
      document.querySelectorAll('.btn-editar').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = parseInt(e.target.getAttribute('data-id'));
          editarAlumno(id);
        });
      });
    }
    
    // Actualizar checkbox "Seleccionar todos"
    function actualizarSeleccionarTodos() {
      const alumnosFiltrados = filtroActivo ? 
        alumnos.filter(a => 
          a.matricula.toLowerCase().includes(filtroActivo.toLowerCase()) || 
          a.nombre.toLowerCase().includes(filtroActivo.toLowerCase()) ||
          a.email.toLowerCase().includes(filtroActivo.toLowerCase())
        ) : alumnos;
      
      const todosSeleccionados = alumnosFiltrados.length > 0 && alumnosFiltrados.every(a => a.seleccionado);
      chkSeleccionarTodos.checked = todosSeleccionados;
    }
    
    // Seleccionar/Deseleccionar todos
    function seleccionarTodos() {
      const seleccionar = chkSeleccionarTodos.checked;
      
      let alumnosAAfectar = alumnos;
      if (filtroActivo) {
        const filtroLower = filtroActivo.toLowerCase();
        alumnosAAfectar = alumnos.filter(a => 
          a.matricula.toLowerCase().includes(filtroLower) || 
          a.nombre.toLowerCase().includes(filtroLower) ||
          a.email.toLowerCase().includes(filtroLower)
        );
      }
      
      alumnosAAfectar.forEach(alumno => {
        alumno.seleccionado = seleccionar;
      });
      
      renderizarTabla();
    }
    
    // Editar alumno
    function editarAlumno(id) {
      const alumno = alumnos.find(a => a.id === id);
      if (alumno) {
        let mensaje = '✏️ EDITAR ALUMNO\n\n';
        mensaje += `Matrícula: ${alumno.matricula}\n\n`;
        mensaje += `Deja en blanco los campos que no quieras modificar.\n\n`;
        
        const nuevoNombre = prompt(mensaje + 'Nuevo nombre:', alumno.nombre);
        if (nuevoNombre && nuevoNombre.trim()) {
          alumno.nombre = nuevoNombre.trim();
        }
        
        const nuevoEmail = prompt('Nuevo email:', alumno.email);
        if (nuevoEmail && nuevoEmail.trim()) {
          alumno.email = nuevoEmail.trim();
        }
        
        const nuevoGrado = prompt('Nuevo grado (GII, GIOI, GPOI, GADE, GIC):', alumno.grado);
        if (nuevoGrado && nuevoGrado.trim() && gradosDisponibles.includes(nuevoGrado.trim().toUpperCase())) {
          alumno.grado = nuevoGrado.trim().toUpperCase();
        } else if (nuevoGrado && nuevoGrado.trim()) {
          alert(`⚠️ El grado "${nuevoGrado}" no es válido. Los grados disponibles son: ${gradosDisponibles.join(', ')}`);
        }
        
        const nuevoCurso = prompt('Nuevo curso (1°, 2°, 3°, 4°):', alumno.curso);
        if (nuevoCurso && nuevoCurso.trim() && cursosDisponibles.includes(nuevoCurso.trim())) {
          alumno.curso = nuevoCurso.trim();
        } else if (nuevoCurso && nuevoCurso.trim()) {
          alert(`⚠️ El curso "${nuevoCurso}" no es válido. Los cursos disponibles son: ${cursosDisponibles.join(', ')}`);
        }
        
        renderizarTabla();
        alert(`✅ Alumno "${alumno.matricula} - ${alumno.nombre}" actualizado correctamente.`);
      }
    }
    
    // Filtrar alumnos
    function filtrarAlumnos() {
      filtroActivo = inputBuscar.value.trim();
      // Limpiar selecciones al filtrar
      alumnos.forEach(a => a.seleccionado = false);
      chkSeleccionarTodos.checked = false;
      renderizarTabla();
      
      if (filtroActivo) {
        const resultados = alumnos.filter(a => 
          a.matricula.toLowerCase().includes(filtroActivo.toLowerCase()) || 
          a.nombre.toLowerCase().includes(filtroActivo.toLowerCase()) ||
          a.email.toLowerCase().includes(filtroActivo.toLowerCase())
        );
        alert(`🔍 Filtro aplicado: "${filtroActivo}"\n\nSe encontraron ${resultados.length} resultado(s).`);
      }
    }
    
    // Generar siguiente número de matrícula
    function generarNuevaMatricula() {
      const numeros = alumnos.map(a => {
        const match = a.matricula.match(/AL(\d+)/);
        return match ? parseInt(match[1]) : 0;
      });
      const maxNumero = Math.max(...numeros, 0);
      const nuevoNumero = (maxNumero + 1).toString().padStart(6, '0');
      return `AL${nuevoNumero}`;
    }
    
    // Crear nuevo alumno
    function crearNuevo() {
      const nuevaMatricula = generarNuevaMatricula();
      
      const nuevoNombre = prompt('Ingrese el nombre completo del alumno:');
      if (!nuevoNombre || !nuevoNombre.trim()) return;
      
      const nuevoEmail = prompt('Ingrese el email del alumno:');
      if (!nuevoEmail || !nuevoEmail.trim()) return;
      
      const nuevoGrado = prompt('Ingrese el grado (GII, GIOI, GPOI, GADE, GIC):');
      if (!nuevoGrado || !nuevoGrado.trim()) return;
      
      const gradoValidado = nuevoGrado.trim().toUpperCase();
      if (!gradosDisponibles.includes(gradoValidado)) {
        alert(`⚠️ El grado "${nuevoGrado}" no es válido. Se usará "${gradosDisponibles[0]}" como predeterminado.`);
      }
      
      const nuevoCurso = prompt('Ingrese el curso (1°, 2°, 3°, 4°):');
      if (!nuevoCurso || !nuevoCurso.trim()) return;
      
      const cursoValidado = nuevoCurso.trim();
      if (!cursosDisponibles.includes(cursoValidado)) {
        alert(`⚠️ El curso "${nuevoCurso}" no es válido. Se usará "${cursosDisponibles[0]}" como predeterminado.`);
      }
      
      const nuevoId = Math.max(...alumnos.map(a => a.id), 0) + 1;
      
      alumnos.push({
        id: nuevoId,
        matricula: nuevaMatricula,
        nombre: nuevoNombre.trim(),
        email: nuevoEmail.trim(),
        grado: gradosDisponibles.includes(gradoValidado) ? gradoValidado : gradosDisponibles[0],
        curso: cursosDisponibles.includes(cursoValidado) ? cursoValidado : cursosDisponibles[0],
        seleccionado: false
      });
      
      alumnosOriginales = JSON.parse(JSON.stringify(alumnos));
      renderizarTabla();
      alert(`✅ Alumno creado correctamente.\n\nMatrícula asignada: ${nuevaMatricula}\nNombre: ${nuevoNombre}`);
    }
    
    // Importar alumnos
    function importarAlumnos() {
      alert('📎 Función de importación de alumnos\n\nSe abrirá el asistente para importar alumnos desde archivo CSV o Excel.');
    }
    
    // Eliminar seleccionado
    function eliminarSeleccionado() {
      const seleccionados = alumnos.filter(a => a.seleccionado);
      
      if (seleccionados.length === 0) {
        alert('⚠️ No hay ningún alumno seleccionado para eliminar.');
        return;
      }
      
      let mensaje = '¿Estás seguro de que deseas eliminar los siguientes alumnos?\n\n';
      seleccionados.forEach(a => {
        mensaje += `• ${a.matricula} - ${a.nombre}\n`;
        mensaje += `  ${a.email} (${a.grado} - ${a.curso})\n`;
      });
      mensaje += `\n⚠️ Esta acción no se puede deshacer.`;
      
      const confirmar = confirm(mensaje);
      if (confirmar) {
        alumnos = alumnos.filter(a => !a.seleccionado);
        alumnosOriginales = JSON.parse(JSON.stringify(alumnos));
        chkSeleccionarTodos.checked = false;
        renderizarTabla();
        alert(`✅ ${seleccionados.length} alumno(s) eliminado(s) correctamente.`);
      }
    }
    
    // Salir
    function salir() {
      const confirmar = confirm('¿Estás seguro de que deseas salir?');
      if (confirmar) {
        alert('👋 Saliendo del administrador de alumnos...');
      }
    }
    
    // Eventos
    chkSeleccionarTodos.addEventListener('change', seleccionarTodos);
    btnFiltrar.addEventListener('click', filtrarAlumnos);
    document.getElementById('btnCrear').addEventListener('click', crearNuevo);
    document.getElementById('btnImportar').addEventListener('click', importarAlumnos);
    document.getElementById('btnEliminar').addEventListener('click', eliminarSeleccionado);
    document.getElementById('btnSalir').addEventListener('click', salir);
    
    // Permitir filtrar con Enter
    inputBuscar.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        filtrarAlumnos();
      }
    });
    
    // Inicializar
    renderizarTabla();
  </script>

</body>
</html>
