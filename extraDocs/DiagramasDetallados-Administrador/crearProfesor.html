<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crear Nuevo Profesor</title>

  <style>
    *{
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body{
      background: #e9e9e9;
      font-family: "Courier New", monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .contenedor{
      width: 550px;
      background: #ececec;
      padding: 25px;
      border: 1px solid #cfcfcf;
    }

    .titulo{
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      text-decoration: underline;
      margin-bottom: 30px;
      letter-spacing: 1px;
    }

    .campo{
      margin-bottom: 20px;
    }

    .campo label{
      display: block;
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .campo input{
      width: 100%;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 16px;
      border: 1px solid #bdbdbd;
      background: white;
    }

    .campo select{
      width: 100%;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 16px;
      border: 1px solid #bdbdbd;
      background: white;
      cursor: pointer;
    }

    .campo input:focus,
    .campo select:focus{
      outline: none;
      border-color: #2d89ef;
    }

    .botones{
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }

    .btn{
      min-width: 150px;
      padding: 10px 20px;
      border-radius: 4px;
      font-size: 16px;
      font-family: inherit;
      cursor: pointer;
      border: 1px solid #999;
      font-weight: bold;
    }

    .btn-crear{
      background: #28a745;
      color: white;
      border: 1px solid #1e7e34;
    }

    .btn-crear:hover{
      background: #218838;
    }

    .btn-cancelar{
      background: #f3f0ec;
      color: black;
    }

    .btn-cancelar:hover{
      background: #e3dfda;
    }
  </style>
</head>

<body>

  <div class="contenedor">

    <h1 class="titulo">CREAR NUEVO PROFESOR</h1>

    <div class="campo">
      <label for="codigo">Código:</label>
      <input type="text" id="codigo" placeholder="Ej: PRO005" maxlength="10">
    </div>

    <div class="campo">
      <label for="nombre">Nombre:</label>
      <input type="text" id="nombre" placeholder="Ej: Manuel Masías">
    </div>

    <div class="campo">
      <label for="email">Email:</label>
      <input type="email" id="email" placeholder="Ej: profesor@uneatlantico.es">
    </div>

    <div class="campo">
      <label for="departamento">Departamento:</label>
      <select id="departamento">
        <option value="">-- Seleccionar departamento --</option>
        <option value="Informática">Informática</option>
        <option value="Matemáticas">Matemáticas</option>
        <option value="Física">Física</option>
        <option value="Química">Química</option>
        <option value="Administración">Administración</option>
        <option value="Psicología">Psicología</option>
        <option value="Ingeniería Civil">Ingeniería Civil</option>
        <option value="Electrónica">Electrónica</option>
      </select>
    </div>

    <div class="botones">
      <button class="btn btn-crear" id="btnCrear">Crear profesor</button>
      <button class="btn btn-cancelar" id="btnCancelar">Cancelar</button>
    </div>

  </div>

  <script>
    // Profesores existentes para validación de código
    const profesoresExistentes = ['PRO001', 'PRO002', 'PRO003', 'PROF004'];

    // Elementos del DOM
    const inputCodigo = document.getElementById('codigo');
    const inputNombre = document.getElementById('nombre');
    const inputEmail = document.getElementById('email');
    const selectDepartamento = document.getElementById('departamento');
    const btnCrear = document.getElementById('btnCrear');
    const btnCancelar = document.getElementById('btnCancelar');

    // Validar código
    function validarCodigo(codigo) {
      if (!codigo || codigo.trim() === '') {
        alert('❌ El código es obligatorio.');
        return false;
      }
      
      if (codigo.trim().length < 3) {
        alert('❌ El código debe tener al menos 3 caracteres.');
        return false;
      }
      
      const regex = /^[A-Z0-9-]+$/i;
      if (!regex.test(codigo.trim())) {
        alert('❌ El código solo puede contener letras, números y guiones.');
        return false;
      }
      
      return true;
    }

    // Validar nombre
    function validarNombre(nombre) {
      if (!nombre || nombre.trim() === '') {
        alert('❌ El nombre es obligatorio.');
        return false;
      }
      
      if (nombre.trim().length < 3) {
        alert('❌ El nombre debe tener al menos 3 caracteres.');
        return false;
      }
      
      return true;
    }

    // Validar email
    function validarEmail(email) {
      if (!email || email.trim() === '') {
        alert('❌ El email es obligatorio.');
        return false;
      }
      
      const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!regex.test(email.trim())) {
        alert('❌ El email no es válido.\n\nEjemplo: nombre@dominio.com');
        return false;
      }
      
      return true;
    }

    // Validar departamento
    function validarDepartamento(departamento) {
      if (!departamento || departamento === '') {
        alert('❌ Debe seleccionar un departamento.');
        return false;
      }
      return true;
    }

    // Verificar si el código ya existe
    function codigoExiste(codigo) {
      return profesoresExistentes.includes(codigo.trim().toUpperCase());
    }

    // Crear profesor
    function crearProfesor() {
      const codigo = inputCodigo.value;
      const nombre = inputNombre.value;
      const email = inputEmail.value;
      const departamento = selectDepartamento.value;
      
      // Validaciones
      if (!validarCodigo(codigo)) {
        inputCodigo.focus();
        return;
      }
      
      if (!validarNombre(nombre)) {
        inputNombre.focus();
        return;
      }
      
      if (!validarEmail(email)) {
        inputEmail.focus();
        return;
      }
      
      if (!validarDepartamento(departamento)) {
        selectDepartamento.focus();
        return;
      }
      
      const codigoUpper = codigo.trim().toUpperCase();
      
      // Verificar código duplicado
      if (codigoExiste(codigoUpper)) {
        alert(`❌ El código "${codigoUpper}" ya existe.\n\nPor favor, use un código diferente.`);
        inputCodigo.focus();
        return;
      }
      
      // Confirmar creación
      const confirmar = confirm(`¿Desea crear el siguiente profesor?\n\nCódigo: ${codigoUpper}\nNombre: ${nombre.trim()}\nEmail: ${email.trim()}\nDepartamento: ${departamento}`);
      
      if (confirmar) {
        alert(`✅ ¡Profesor creado exitosamente!\n\nCódigo: ${codigoUpper}\nNombre: ${nombre.trim()}\nEmail: ${email.trim()}\nDepartamento: ${departamento}`);
        
        // Limpiar campos
        inputCodigo.value = '';
        inputNombre.value = '';
        inputEmail.value = '';
        selectDepartamento.value = '';
        inputCodigo.focus();
      }
    }

    // Cancelar
    function cancelar() {
      const confirmar = confirm('¿Estás seguro de que deseas cancelar?\n\nLos datos ingresados se perderán.');
      if (confirmar) {
        inputCodigo.value = '';
        inputNombre.value = '';
        inputEmail.value = '';
        selectDepartamento.value = '';
        alert('🔄 Operación cancelada.');
      }
    }

    // Eventos
    btnCrear.addEventListener('click', crearProfesor);
    btnCancelar.addEventListener('click', cancelar);
    
    // Navegación con Enter
    inputCodigo.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') inputNombre.focus();
    });
    
    inputNombre.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') inputEmail.focus();
    });
    
    inputEmail.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') selectDepartamento.focus();
    });
    
    selectDepartamento.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') crearProfesor();
    });
    
    // Enfocar primer campo
    inputCodigo.focus();
  </script>

</body>
</html>
