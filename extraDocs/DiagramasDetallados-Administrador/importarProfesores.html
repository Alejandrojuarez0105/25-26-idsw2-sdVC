<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Importar Profesores</title>

  <style>
    *{
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body{
      background: #e9e9e9;
      font-family: "Courier New", monospace;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .contenedor{
      width: 650px;
      background: #ececec;
    }

    .titulo{
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      text-decoration: underline;
      margin-bottom: 25px;
      letter-spacing: 1px;
    }

    .panel{
      border: 1px solid #cfcfcf;
      padding: 18px;
      margin-bottom: 28px;
      background: #ededed;
    }

    .panel-archivo{
      background: #dfe7ef;
      border: 2px solid #7ea0c0;
    }

    .label{
      font-size: 18px;
      margin-bottom: 15px;
      display: block;
    }

    .fila{
      display: flex;
      align-items: center;
      gap: 30px;
      padding-left: 18px;
    }

    .btn-examinar{
      padding: 10px 32px;
      background: #ece6df;
      border: 1px solid #9b9b9b;
      border-radius: 2px;
      cursor: pointer;
      font-size: 18px;
      font-family: inherit;
      font-weight: bold;
    }

    .btn-examinar:hover{
      background: #ddd7d0;
    }

    .input-archivo{
      width: 360px;
      padding: 10px 14px;
      border: 1px solid #bdbdbd;
      background: #f5f5f5;
      font-size: 18px;
      font-family: inherit;
      font-style: italic;
      color: #555;
    }

    .opcion{
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 28px;
      padding-left: 22px;
    }

    .opcion input{
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .opcion label{
      font-size: 18px;
      cursor: pointer;
    }

    /* Mensajes de error y éxito */
    .mensaje-error{
      background: #f8d7da;
      border-left: 4px solid #dc3545;
      color: #721c24;
      padding: 10px 15px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }

    .mensaje-exito{
      background: #d4edda;
      border-left: 4px solid #28a745;
      color: #155724;
      padding: 10px 15px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }

    .info-archivo{
      margin-top: 10px;
      padding-left: 18px;
      font-size: 12px;
      color: #555;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    hr{
      border: none;
      border-top: 2px solid #cfcfcf;
      margin-bottom: 25px;
    }

    .botones{
      display: flex;
      justify-content: center;
      gap: 40px;
    }

    .btn{
      min-width: 215px;
      padding: 14px 25px;
      border-radius: 4px;
      font-size: 18px;
      font-family: inherit;
      cursor: pointer;
      border: 1px solid #999;
      font-weight: bold;
    }

    .btn-importar{
      background: #2d89ef;
      color: white;
      border: 1px solid #1d5faa;
    }

    .btn-importar:hover:not(:disabled){
      background: #1e6bc7;
    }

    .btn-importar:disabled{
      background: #9ab3d1;
      cursor: not-allowed;
    }

    .btn-cancelar{
      background: #f3f0ec;
      color: black;
    }

    .btn-cancelar:hover{
      background: #e3dfda;
    }
  </style>
</head>

<body>

  <div class="contenedor">

    <h1 class="titulo">IMPORTAR PROFESORES</h1>

    <!-- Mensajes de error/éxito -->
    <div id="mensajeError" class="mensaje-error"></div>
    <div id="mensajeExito" class="mensaje-exito"></div>

    <div class="panel panel-archivo">

      <label class="label">Seleccionar archivo:</label>

      <div class="fila">

        <button class="btn-examinar" id="btnExaminar">
          Examinar...
        </button>

        <input 
          type="text" 
          class="input-archivo"
          id="nombreArchivo"
          value="Ningún archivo seleccionado"
          readonly
        >

      </div>

      <div class="info-archivo">
        <span>📄</span>
        <span>Formatos permitidos: <strong>CSV</strong> (extensión .csv) - Máximo 10MB</span>
      </div>

    </div>

    <div class="panel">

      <label class="label">Opciones:</label>

      <div class="opcion">
        <input type="checkbox" id="chkValidarEmail" checked>
        <label>Validar emails únicos</label>
      </div>

      <div class="opcion">
        <input type="checkbox" id="chkGenerarPass" checked>
        <label>Generar contraseñas</label>
      </div>

      <div class="opcion">
        <input type="checkbox" id="chkEnviarEmail">
        <label>Enviar email bienvenida</label>
      </div>

    </div>

    <hr>

    <div class="botones">

      <button class="btn btn-importar" id="btnImportar" disabled>
        Importar profesores
      </button>

      <button class="btn btn-cancelar" id="btnCancelar">
        Cancelar
      </button>

    </div>

  </div>

  <script>
    // Elementos del DOM
    const btnExaminar = document.getElementById('btnExaminar');
    const nombreArchivo = document.getElementById('nombreArchivo');
    const btnImportar = document.getElementById('btnImportar');
    const btnCancelar = document.getElementById('btnCancelar');
    const mensajeError = document.getElementById('mensajeError');
    const mensajeExito = document.getElementById('mensajeExito');
    
    // Checkboxes
    const chkValidarEmail = document.getElementById('chkValidarEmail');
    const chkGenerarPass = document.getElementById('chkGenerarPass');
    const chkEnviarEmail = document.getElementById('chkEnviarEmail');
    
    let archivoSeleccionado = null;
    
    // Crear input de archivo oculto
    const inputArchivoOculto = document.createElement('input');
    inputArchivoOculto.type = 'file';
    inputArchivoOculto.accept = '.csv';
    inputArchivoOculto.style.display = 'none';
    document.body.appendChild(inputArchivoOculto);
    
    // Funciones de mensajes
    function ocultarMensajes() {
      mensajeError.style.display = 'none';
      mensajeExito.style.display = 'none';
    }
    
    function mostrarError(texto) {
      mensajeError.textContent = texto;
      mensajeError.style.display = 'block';
      mensajeExito.style.display = 'none';
    }
    
    function mostrarExito(texto) {
      mensajeExito.textContent = texto;
      mensajeExito.style.display = 'block';
      mensajeError.style.display = 'none';
    }
    
    // Validar archivo CSV
    function validarArchivo(file) {
      if (!file) {
        mostrarError('⚠️ No has seleccionado ningún archivo.');
        btnImportar.disabled = true;
        return false;
      }
      
      const extension = file.name.split('.').pop().toLowerCase();
      
      if (extension !== 'csv') {
        mostrarError(`❌ Formato no válido. El archivo "${file.name}" no es un CSV. Por favor, selecciona un archivo con extensión .csv`);
        btnImportar.disabled = true;
        return false;
      }
      
      if (file.size === 0) {
        mostrarError('❌ El archivo está vacío.');
        btnImportar.disabled = true;
        return false;
      }
      
      const maxSize = 10 * 1024 * 1024; // 10MB
      if (file.size > maxSize) {
        mostrarError(`❌ El archivo es demasiado grande (máximo 10MB). Tamaño actual: ${(file.size / 1024 / 1024).toFixed(2)}MB`);
        btnImportar.disabled = true;
        return false;
      }
      
      mostrarExito(`✅ Archivo válido: "${file.name}" (${(file.size / 1024).toFixed(2)} KB) - Listo para importar`);
      btnImportar.disabled = false;
      return true;
    }
    
    // Evento para examinar archivo
    btnExaminar.addEventListener('click', () => {
      ocultarMensajes();
      inputArchivoOculto.click();
    });
    
    // Evento cuando se selecciona un archivo
    inputArchivoOculto.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        archivoSeleccionado = e.target.files[0];
        nombreArchivo.value = archivoSeleccionado.name;
        validarArchivo(archivoSeleccionado);
      } else {
        archivoSeleccionado = null;
        nombreArchivo.value = 'Ningún archivo seleccionado';
        btnImportar.disabled = true;
        ocultarMensajes();
      }
    });
    
    // Evento Importar
    btnImportar.addEventListener('click', () => {
      if (!archivoSeleccionado) {
        mostrarError('Por favor, selecciona un archivo CSV primero.');
        return;
      }
      
      const valido = validarArchivo(archivoSeleccionado);
      if (!valido) return;
      
      // Leer el archivo CSV
      const lector = new FileReader();
      
      lector.onload = function(evento) {
        const contenido = evento.target.result;
        const lineas = contenido.split('\n').filter(linea => linea.trim() !== '');
        
        // Construir mensaje con las opciones seleccionadas
        let opcionesTexto = '';
        if (chkValidarEmail.checked) opcionesTexto += '\n- ✓ Validar emails únicos';
        if (chkGenerarPass.checked) opcionesTexto += '\n- ✓ Generar contraseñas';
        if (chkEnviarEmail.checked) opcionesTexto += '\n- ✓ Enviar email bienvenida';
        
        if (opcionesTexto === '') opcionesTexto = '\n- Ninguna opción seleccionada';
        
        alert(`✅ IMPORTACIÓN COMPLETADA!\n\n📁 Archivo: ${archivoSeleccionado.name}\n📊 Líneas procesadas: ${lineas.length}\n⚙️ Opciones aplicadas:${opcionesTexto}`);
        
        mostrarExito(`🎉 ¡Importación exitosa! Se procesaron ${lineas.length} registros correctamente.`);
        
        // Opcional: Aquí puedes agregar más lógica para procesar el CSV
        console.log('Contenido del CSV:', contenido);
      };
      
      lector.onerror = function() {
        mostrarError('❌ Error al leer el archivo. Por favor, inténtalo de nuevo.');
      };
      
      lector.readAsText(archivoSeleccionado, 'UTF-8');
    });
    
    // Evento Cancelar
    btnCancelar.addEventListener('click', () => {
      // Limpiar todo
      archivoSeleccionado = null;
      inputArchivoOculto.value = '';
      nombreArchivo.value = 'Ningún archivo seleccionado';
      btnImportar.disabled = true;
      ocultarMensajes();
      
      // Resetear checkboxes a valores por defecto
      chkValidarEmail.checked = true;
      chkGenerarPass.checked = true;
      chkEnviarEmail.checked = false;
      
      mostrarExito('🔄 Operación cancelada. Todo ha sido reiniciado.');
    });
  </script>

</body>
</html>
