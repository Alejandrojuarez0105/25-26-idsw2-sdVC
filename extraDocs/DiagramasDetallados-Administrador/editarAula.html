<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Editar Aula</title>

  <style>
    *{
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body{
      background: #e9e9e9;
      font-family: "Courier New", monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .contenedor{
      width: 650px;
      background: #ececec;
      padding: 25px;
      border: 1px solid #cfcfcf;
    }

    .titulo{
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      text-decoration: underline;
      margin-bottom: 30px;
      letter-spacing: 1px;
    }

    .subtitulo{
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 20px;
      color: #555;
    }

    .campo{
      margin-bottom: 20px;
    }

    .campo label{
      display: block;
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .campo input{
      width: 100%;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 16px;
      border: 1px solid #bdbdbd;
      background: #f5f5f5;
    }

    .campo input:focus{
      outline: none;
      border-color: #2d89ef;
      background: white;
    }

    .campo select{
      width: 100%;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 16px;
      border: 1px solid #bdbdbd;
      background: #f5f5f5;
      cursor: pointer;
    }

    .campo select:focus{
      outline: none;
      border-color: #2d89ef;
      background: white;
    }

    .campo textarea{
      width: 100%;
      padding: 12px;
      font-family: inherit;
      font-size: 14px;
      border: 1px solid #bdbdbd;
      background: #f5f5f5;
      resize: vertical;
      min-height: 80px;
      line-height: 1.5;
      font-style: italic;
    }

    .campo textarea:focus{
      outline: none;
      border-color: #2d89ef;
      background: white;
    }

    .codigo-disabled{
      background: #e9ecef;
      color: #666;
      cursor: not-allowed;
    }

    .fila-doble{
      display: flex;
      gap: 20px;
    }

    .fila-doble .campo{
      flex: 1;
    }

    .info-adicional{
      background: #e7f3ff;
      padding: 12px 15px;
      margin: 20px 0;
      border-left: 4px solid #2d89ef;
      font-size: 14px;
      font-style: italic;
      color: #2c3e50;
    }

    hr{
      border: none;
      border-top: 2px solid #cfcfcf;
      margin: 25px 0 20px 0;
    }

    .botones{
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .btn{
      min-width: 150px;
      padding: 10px 20px;
      border-radius: 4px;
      font-size: 15px;
      font-family: inherit;
      cursor: pointer;
      border: 1px solid #999;
      font-weight: bold;
    }

    .btn-guardar{
      background: #28a745;
      color: white;
      border: 1px solid #1e7e34;
    }

    .btn-guardar:hover{
      background: #218838;
    }

    .btn-continuar{
      background: #2d89ef;
      color: white;
      border: 1px solid #1d5faa;
    }

    .btn-continuar:hover{
      background: #1e6bc7;
    }

    .btn-cancelar{
      background: #f3f0ec;
      color: black;
    }

    .btn-cancelar:hover{
      background: #e3dfda;
    }
  </style>
</head>

<body>

  <div class="contenedor">

    <h1 class="titulo">EDITAR AULA</h1>

    <div class="subtitulo">📌 Datos del aula:</div>

    <div class="fila-doble">
      <div class="campo">
        <label for="codigo">Código:</label>
        <input type="text" id="codigo" value="A-101" class="codigo-disabled" readonly disabled>
      </div>
      <div class="campo">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" value="Aula -2.6">
      </div>
    </div>

    <div class="fila-doble">
      <div class="campo">
        <label for="edificio">Edificio:</label>
        <select id="edificio">
          <option value="Edif. A" selected>Edif. A</option>
          <option value="Edif. B">Edif. B</option>
          <option value="Edif. C">Edif. C</option>
          <option value="Edif. D">Edif. D</option>
        </select>
      </div>
      <div class="campo">
        <label for="capacidad">Capacidad:</label>
        <input type="number" id="capacidad" value="50" min="1" max="500" step="1">
      </div>
    </div>

    <div class="fila-doble">
      <div class="campo">
        <label for="tipo">Tipo:</label>
        <select id="tipo">
          <option value="Teoría">Teoría</option>
          <option value="Práctica" selected>Práctica</option>
          <option value="Laboratorio">Laboratorio</option>
          <option value="Seminario">Seminario</option>
        </select>
      </div>
      <div class="campo">
        <label for="recursos">Recursos:</label>
        <input type="text" id="recursos" value="Proyector, PC, Pizarra">
      </div>
    </div>

    <div class="campo">
      <label for="observaciones">Observaciones:</label>
      <textarea id="observaciones">Aire acondicionado</textarea>
    </div>

    <div class="info-adicional">
      💡 Aula práctica equipada con proyector, PC y pizarra. Capacidad para 50 estudiantes.
    </div>

    <hr>

    <div class="botones">
      <button class="btn btn-guardar" id="btnGuardar">💾 Guardar cambios</button>
      <button class="btn btn-continuar" id="btnContinuar">📌 Continuar editando</button>
      <button class="btn btn-cancelar" id="btnCancelar">❌ Cancelar</button>
    </div>

  </div>

  <script>
    // Elementos del DOM
    const inputCodigo = document.getElementById('codigo');
    const inputNombre = document.getElementById('nombre');
    const selectEdificio = document.getElementById('edificio');
    const inputCapacidad = document.getElementById('capacidad');
    const selectTipo = document.getElementById('tipo');
    const inputRecursos = document.getElementById('recursos');
    const textareaObservaciones = document.getElementById('observaciones');
    const btnGuardar = document.getElementById('btnGuardar');
    const btnContinuar = document.getElementById('btnContinuar');
    const btnCancelar = document.getElementById('btnCancelar');

    // Datos originales (simulados)
    const datosOriginales = {
      codigo: 'A-101',
      nombre: 'Aula -2.6',
      edificio: 'Edif. A',
      capacidad: 50,
      tipo: 'Práctica',
      recursos: 'Proyector, PC, Pizarra',
      observaciones: 'Aire acondicionado'
    };

    // Verificar si hay cambios
    function hayCambios() {
      const nombreActual = inputNombre.value.trim();
      const edificioActual = selectEdificio.value;
      const capacidadActual = parseInt(inputCapacidad.value);
      const tipoActual = selectTipo.value;
      const recursosActual = inputRecursos.value.trim();
      const observacionesActual = textareaObservaciones.value.trim();
      
      return nombreActual !== datosOriginales.nombre ||
             edificioActual !== datosOriginales.edificio ||
             capacidadActual !== datosOriginales.capacidad ||
             tipoActual !== datosOriginales.tipo ||
             recursosActual !== datosOriginales.recursos ||
             observacionesActual !== datosOriginales.observaciones;
    }

    // Obtener datos actuales
    function getDatosActuales() {
      return {
        codigo: inputCodigo.value,
        nombre: inputNombre.value.trim(),
        edificio: selectEdificio.value,
        capacidad: parseInt(inputCapacidad.value),
        tipo: selectTipo.value,
        recursos: inputRecursos.value.trim(),
        observaciones: textareaObservaciones.value.trim()
      };
    }

    // Validar nombre
    function validarNombre(nombre) {
      if (!nombre || nombre === '') {
        alert('❌ El nombre no puede estar vacío.');
        return false;
      }
      
      if (nombre.length < 3) {
        alert('❌ El nombre debe tener al menos 3 caracteres.');
        return false;
      }
      
      return true;
    }

    // Validar capacidad
    function validarCapacidad(capacidad) {
      if (isNaN(capacidad) || capacidad === '') {
        alert('❌ La capacidad es obligatoria.');
        return false;
      }
      
      if (capacidad < 1) {
        alert('❌ La capacidad debe ser al menos 1.');
        return false;
      }
      
      if (capacidad > 500) {
        alert('❌ La capacidad no puede superar los 500.');
        return false;
      }
      
      return true;
    }

    // Validar recursos
    function validarRecursos(recursos) {
      if (!recursos || recursos === '') {
        alert('❌ Los recursos no pueden estar vacíos.');
        return false;
      }
      
      if (recursos.length < 3) {
        alert('❌ Los recursos deben tener al menos 3 caracteres.');
        return false;
      }
      
      return true;
    }

    // Validar observaciones
    function validarObservaciones(observaciones) {
      if (!observaciones || observaciones === '') {
        alert('❌ Las observaciones no pueden estar vacías.');
        return false;
      }
      
      return true;
    }

    // Guardar cambios
    function guardarCambios() {
      const nombre = inputNombre.value;
      const capacidad = inputCapacidad.value;
      const recursos = inputRecursos.value;
      const observaciones = textareaObservaciones.value;
      
      if (!validarNombre(nombre)) {
        inputNombre.focus();
        return;
      }
      
      if (!validarCapacidad(parseInt(capacidad))) {
        inputCapacidad.focus();
        return;
      }
      
      if (!validarRecursos(recursos)) {
        inputRecursos.focus();
        return;
      }
      
      if (!validarObservaciones(observaciones)) {
        textareaObservaciones.focus();
        return;
      }
      
      if (!hayCambios()) {
        alert('ℹ️ No se detectaron cambios para guardar.');
        return;
      }
      
      const datosActuales = getDatosActuales();
      
      const confirmar = confirm(`¿Guardar los cambios del aula "${datosOriginales.codigo}"?\n\nNombre: ${datosActuales.nombre}\nEdificio: ${datosActuales.edificio}\nCapacidad: ${datosActuales.capacidad}\nTipo: ${datosActuales.tipo}\nRecursos: ${datosActuales.recursos}\n\nObservaciones: ${datosActuales.observaciones}`);
      
      if (confirmar) {
        // Actualizar datos originales
        datosOriginales.nombre = datosActuales.nombre;
        datosOriginales.edificio = datosActuales.edificio;
        datosOriginales.capacidad = datosActuales.capacidad;
        datosOriginales.tipo = datosActuales.tipo;
        datosOriginales.recursos = datosActuales.recursos;
        datosOriginales.observaciones = datosActuales.observaciones;
        
        alert(`✅ Cambios guardados exitosamente.\n\nAula: ${datosOriginales.codigo}\nNombre: ${datosOriginales.nombre}\nCapacidad: ${datosOriginales.capacidad}`);
      }
    }

    // Continuar editando
    function continuarEditando() {
      if (hayCambios()) {
        alert('📌 Continuando con la edición...\n\nLos cambios no guardados se mantendrán en el formulario.');
      } else {
        alert('📌 No hay cambios pendientes. Puede seguir editando el aula.');
      }
    }

    // Cancelar
    function cancelar() {
      if (hayCambios()) {
        const confirmar = confirm('⚠️ Hay cambios sin guardar.\n\n¿Estás seguro de que deseas cancelar? Los cambios se perderán.');
        if (confirmar) {
          // Restaurar valores originales
          inputNombre.value = datosOriginales.nombre;
          selectEdificio.value = datosOriginales.edificio;
          inputCapacidad.value = datosOriginales.capacidad;
          selectTipo.value = datosOriginales.tipo;
          inputRecursos.value = datosOriginales.recursos;
          textareaObservaciones.value = datosOriginales.observaciones;
          alert('🔄 Edición cancelada. Los datos han sido restaurados.');
        }
      } else {
        const confirmar = confirm('¿Estás seguro de que deseas salir del editor?');
        if (confirmar) {
          alert('👋 Saliendo del editor de aulas...');
        }
      }
    }

    // Eventos
    btnGuardar.addEventListener('click', guardarCambios);
    btnContinuar.addEventListener('click', continuarEditando);
    btnCancelar.addEventListener('click', cancelar);
    
    // Enfocar el primer campo editable
    inputNombre.focus();
  </script>

</body>
</html>
