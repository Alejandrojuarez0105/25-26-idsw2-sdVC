<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crear Nuevo Examen</title>

  <style>
    *{
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body{
      background: #e9e9e9;
      font-family: "Courier New", monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .contenedor{
      width: 600px;
      background: #ececec;
      padding: 25px;
      border: 1px solid #cfcfcf;
    }

    .titulo{
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      text-decoration: underline;
      margin-bottom: 30px;
      letter-spacing: 1px;
    }

    .campo{
      margin-bottom: 20px;
    }

    .campo label{
      display: block;
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .campo input,
    .campo select{
      width: 100%;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 16px;
      border: 1px solid #bdbdbd;
      background: white;
    }

    .campo input:focus,
    .campo select:focus{
      outline: none;
      border-color: #2d89ef;
    }

    .fila-doble{
      display: flex;
      gap: 20px;
    }

    .fila-doble .campo{
      flex: 1;
    }

    hr{
      border: none;
      border-top: 2px solid #cfcfcf;
      margin: 25px 0 20px 0;
    }

    .botones{
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 10px;
    }

    .btn{
      min-width: 150px;
      padding: 10px 20px;
      border-radius: 4px;
      font-size: 16px;
      font-family: inherit;
      cursor: pointer;
      border: 1px solid #999;
      font-weight: bold;
    }

    .btn-crear{
      background: #28a745;
      color: white;
      border: 1px solid #1e7e34;
    }

    .btn-crear:hover{
      background: #218838;
    }

    .btn-cancelar{
      background: #f3f0ec;
      color: black;
    }

    .btn-cancelar:hover{
      background: #e3dfda;
    }
  </style>
</head>

<body>

  <div class="contenedor">

    <h1 class="titulo">CREAR NUEVO EXAMEN</h1>

    <div class="campo">
      <label for="codigo">Código:</label>
      <input type="text" id="codigo" placeholder="Ej: EX005" maxlength="10">
    </div>

    <div class="campo">
      <label for="asignatura">Asignatura:</label>
      <select id="asignatura">
        <option value="">-- Seleccionar asignatura --</option>
        <option value="Programación I">Programación I</option>
        <option value="Bases de Datos I">Bases de Datos I</option>
        <option value="Estructuras de Datos I">Estructuras de Datos I</option>
        <option value="Expresión Gráfica">Expresión Gráfica</option>
        <option value="Redes de Ordenadores">Redes de Ordenadores</option>
        <option value="Matemáticas Avanzadas">Matemáticas Avanzadas</option>
        <option value="Estadística">Estadística</option>
      </select>
    </div>

    <div class="fila-doble">
      <div class="campo">
        <label for="fecha">Fecha:</label>
        <input type="date" id="fecha">
      </div>
      <div class="campo">
        <label for="hora">Hora:</label>
        <select id="hora">
          <option value="">-- Seleccionar hora --</option>
          <option value="08:30">08:30</option>
          <option value="11:30">11:30</option>
          <option value="14:30">14:30</option>
          <option value="17:30">17:30</option>
        </select>
      </div>
    </div>

    <div class="fila-doble">
      <div class="campo">
        <label for="aula">Aula:</label>
        <select id="aula">
          <option value="">-- Seleccionar aula --</option>
          <option value="-2.6">Aula -2.6</option>
          <option value="-2.4">Aula -2.4</option>
          <option value="-2.2">Aula -2.2</option>
          <option value="1.2">Aula 1.2</option>
          <option value="1.3">Aula 1.3</option>
          <option value="1.4">Aula 1.4</option>
          <option value="1.5">Aula 1.5</option>
        </select>
      </div>
      <div class="campo">
        <label for="profesor">Profesor:</label>
        <select id="profesor">
          <option value="">-- Seleccionar profesor --</option>
          <option value="Manuel Masías">Manuel Masías</option>
          <option value="Lázaro Hernández">Lázaro Hernández</option>
          <option value="Carlos Galiano">Carlos Galiano</option>
          <option value="Jorge Crespo">Jorge Crespo</option>
          <option value="Javier Bel">Javier Bel</option>
          <option value="Daniel Iglesias">Daniel Iglesias</option>
          <option value="Juan Pérez">Juan Pérez</option>
          <option value="María Gómez">María Gómez</option>
          <option value="Carlos Rodríguez">Carlos Rodríguez</option>
          <option value="Luis López">Luis López</option>
        </select>
      </div>
    </div>

    <hr>

    <div class="botones">
      <button class="btn btn-crear" id="btnCrear">Crear examen</button>
      <button class="btn btn-cancelar" id="btnCancelar">Cancelar</button>
    </div>

  </div>

  <script>
    // Asignaturas existentes para validación de código
    const examenesExistentes = ['EX001', 'EX002', 'EX003', 'EX004'];

    // Elementos del DOM
    const inputCodigo = document.getElementById('codigo');
    const selectAsignatura = document.getElementById('asignatura');
    const inputFecha = document.getElementById('fecha');
    const selectHora = document.getElementById('hora');
    const selectAula = document.getElementById('aula');
    const selectProfesor = document.getElementById('profesor');
    const btnCrear = document.getElementById('btnCrear');
    const btnCancelar = document.getElementById('btnCancelar');

    // Validar código
    function validarCodigo(codigo) {
      if (!codigo || codigo.trim() === '') {
        alert('❌ El código es obligatorio.');
        return false;
      }
      
      if (codigo.trim().length < 3) {
        alert('❌ El código debe tener al menos 3 caracteres.');
        return false;
      }
      
      const regex = /^[A-Z0-9-]+$/i;
      if (!regex.test(codigo.trim())) {
        alert('❌ El código solo puede contener letras, números y guiones.');
        return false;
      }
      
      return true;
    }

    // Validar asignatura
    function validarAsignatura(asignatura) {
      if (!asignatura || asignatura === '') {
        alert('❌ Debe seleccionar una asignatura.');
        return false;
      }
      return true;
    }

    // Validar fecha
    function validarFecha(fecha) {
      if (!fecha) {
        alert('❌ Debe seleccionar una fecha.');
        return false;
      }
      
      const fechaSeleccionada = new Date(fecha);
      const hoy = new Date();
      hoy.setHours(0, 0, 0, 0);
      
      if (fechaSeleccionada < hoy) {
        alert('❌ La fecha no puede ser anterior al día de hoy.');
        return false;
      }
      
      return true;
    }

    // Validar hora
    function validarHora(hora) {
      if (!hora || hora === '') {
        alert('❌ Debe seleccionar una hora.');
        return false;
      }
      return true;
    }

    // Validar aula
    function validarAula(aula) {
      if (!aula || aula === '') {
        alert('❌ Debe seleccionar un aula.');
        return false;
      }
      return true;
    }

    // Validar profesor
    function validarProfesor(profesor) {
      if (!profesor || profesor === '') {
        alert('❌ Debe seleccionar un profesor.');
        return false;
      }
      return true;
    }

    // Verificar si el código ya existe
    function codigoExiste(codigo) {
      return examenesExistentes.includes(codigo.trim().toUpperCase());
    }

    // Formatear fecha para mostrar
    function formatearFecha(fecha) {
      const partes = fecha.split('-');
      return `${partes[2]}/${partes[1]}/${partes[0]}`;
    }

    // Crear examen
    function crearExamen() {
      const codigo = inputCodigo.value;
      const asignatura = selectAsignatura.value;
      const fecha = inputFecha.value;
      const hora = selectHora.value;
      const aula = selectAula.value;
      const profesor = selectProfesor.value;
      
      // Validaciones
      if (!validarCodigo(codigo)) {
        inputCodigo.focus();
        return;
      }
      
      if (!validarAsignatura(asignatura)) {
        selectAsignatura.focus();
        return;
      }
      
      if (!validarFecha(fecha)) {
        inputFecha.focus();
        return;
      }
      
      if (!validarHora(hora)) {
        selectHora.focus();
        return;
      }
      
      if (!validarAula(aula)) {
        selectAula.focus();
        return;
      }
      
      if (!validarProfesor(profesor)) {
        selectProfesor.focus();
        return;
      }
      
      const codigoUpper = codigo.trim().toUpperCase();
      
      // Verificar código duplicado
      if (codigoExiste(codigoUpper)) {
        alert(`❌ El código "${codigoUpper}" ya existe.\n\nPor favor, use un código diferente.`);
        inputCodigo.focus();
        return;
      }
      
      const fechaFormateada = formatearFecha(fecha);
      
      // Confirmar creación
      const confirmar = confirm(`¿Desea crear el siguiente examen?\n\nCódigo: ${codigoUpper}\nAsignatura: ${asignatura}\nFecha: ${fechaFormateada}\nHora: ${hora}\nAula: ${aula}\nProfesor: ${profesor}`);
      
      if (confirmar) {
        alert(`✅ ¡Examen creado exitosamente!\n\nCódigo: ${codigoUpper}\nAsignatura: ${asignatura}\nFecha: ${fechaFormateada}\nHora: ${hora}\nAula: ${aula}\nProfesor: ${profesor}`);
        
        // Limpiar campos
        inputCodigo.value = '';
        selectAsignatura.value = '';
        inputFecha.value = '';
        selectHora.value = '';
        selectAula.value = '';
        selectProfesor.value = '';
        inputCodigo.focus();
      }
    }

    // Cancelar
    function cancelar() {
      const confirmar = confirm('¿Estás seguro de que deseas cancelar?\n\nLos datos ingresados se perderán.');
      if (confirmar) {
        inputCodigo.value = '';
        selectAsignatura.value = '';
        inputFecha.value = '';
        selectHora.value = '';
        selectAula.value = '';
        selectProfesor.value = '';
        alert('🔄 Operación cancelada.');
      }
    }

    // Eventos
    btnCrear.addEventListener('click', crearExamen);
    btnCancelar.addEventListener('click', cancelar);
    
    // Navegación con Enter
    inputCodigo.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') selectAsignatura.focus();
    });
    
    selectAsignatura.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') inputFecha.focus();
    });
    
    inputFecha.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') selectHora.focus();
    });
    
    selectHora.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') selectAula.focus();
    });
    
    selectAula.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') selectProfesor.focus();
    });
    
    selectProfesor.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') crearExamen();
    });
    
    // Enfocar primer campo
    inputCodigo.focus();
  </script>

</body>
</html>
