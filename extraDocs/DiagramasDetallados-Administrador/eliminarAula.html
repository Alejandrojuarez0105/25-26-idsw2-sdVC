<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eliminar Aula</title>

  <style>
    *{
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body{
      background: #e9e9e9;
      font-family: "Courier New", monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .contenedor{
      width: 550px;
      background: #ececec;
      padding: 25px;
      border: 1px solid #cfcfcf;
    }

    .titulo{
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      text-decoration: underline;
      margin-bottom: 30px;
      letter-spacing: 1px;
    }

    .pregunta{
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 20px;
      text-align: center;
    }

    .info-aula{
      background: #f5f5f5;
      border: 1px solid #bdbdbd;
      padding: 15px;
      margin-bottom: 20px;
    }

    .info-linea{
      margin-bottom: 10px;
      font-size: 15px;
    }

    .info-linea strong{
      font-weight: bold;
    }

    .info-descripcion{
      background: #e9ecef;
      padding: 10px;
      margin-top: 10px;
      font-size: 14px;
      font-style: italic;
      color: #555;
      text-align: center;
    }

    .examenes-asociados{
      background: #fff3cd;
      border-left: 4px solid #ffc107;
      padding: 12px 15px;
      margin-bottom: 20px;
      text-align: center;
    }

    .examenes-asociados strong{
      display: block;
      margin-bottom: 5px;
    }

    .advertencia{
      background: #f8d7da;
      border: 2px solid #dc3545;
      padding: 15px;
      margin-bottom: 25px;
      text-align: center;
    }

    .advertencia-titulo{
      font-size: 18px;
      font-weight: bold;
      color: #721c24;
      margin-bottom: 10px;
    }

    .advertencia-mensaje{
      font-size: 14px;
      color: #721c24;
    }

    .advertencia-mensaje p{
      margin-top: 5px;
    }

    .botones{
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 10px;
    }

    .btn{
      min-width: 180px;
      padding: 12px 20px;
      border-radius: 4px;
      font-size: 16px;
      font-family: inherit;
      cursor: pointer;
      border: 1px solid #999;
      font-weight: bold;
    }

    .btn-eliminar{
      background: #dc3545;
      color: white;
      border: 1px solid #a71d2a;
    }

    .btn-eliminar:hover{
      background: #c82333;
    }

    .btn-cancelar{
      background: #f3f0ec;
      color: black;
    }

    .btn-cancelar:hover{
      background: #e3dfda;
    }
  </style>
</head>

<body>

  <div class="contenedor">

    <h1 class="titulo">ELIMINAR AULA</h1>

    <div class="pregunta">
      ¿Está seguro de eliminar esta aula?
    </div>

    <div class="info-aula">
      <div class="info-linea">
        <strong>Código:</strong> A-101
      </div>
      <div class="info-linea">
        <strong>Nombre:</strong> Aula -2.6
      </div>
      <div class="info-linea">
        <strong>Capacidad:</strong> 50
      </div>
      <div class="info-linea">
        <strong>Tipo:</strong> Práctica
      </div>
      <div class="info-descripcion">
        Aula con proyector y aire acondicionado
      </div>
    </div>

    <div class="examenes-asociados">
      <strong>📝 Exámenes programados:</strong>
      8 exámenes próximos
    </div>

    <div class="advertencia">
      <div class="advertencia-titulo">
        ⚠️ ADVERTENCIA ⚠️
      </div>
      <div class="advertencia-mensaje">
        Esta acción es irreversible<br>
        Los exámenes programados deberán ser reasignados
      </div>
    </div>

    <div class="botones">
      <button class="btn btn-eliminar" id="btnConfirmar">🗑️ Confirmar eliminación</button>
      <button class="btn btn-cancelar" id="btnCancelar">❌ Cancelar</button>
    </div>

  </div>

  <script>
    // Datos del aula (simulados)
    const aula = {
      codigo: 'A-101',
      nombre: 'Aula -2.6',
      capacidad: 50,
      tipo: 'Práctica',
      descripcion: 'Aula con proyector y aire acondicionado',
      examenes: 8
    };

    // Elementos del DOM
    const btnConfirmar = document.getElementById('btnConfirmar');
    const btnCancelar = document.getElementById('btnCancelar');

    // Confirmar eliminación
    function confirmarEliminacion() {
      const confirmar = confirm(`⚠️ ELIMINACIÓN PERMANENTE ⚠️\n\n¿Está ABSOLUTAMENTE seguro de que desea eliminar el aula "${aula.codigo} - ${aula.nombre}"?\n\nDatos del aula:\n- Capacidad: ${aula.capacidad}\n- Tipo: ${aula.tipo}\n- Exámenes programados: ${aula.examenes}\n\nEsta acción:\n- Es IRREVERSIBLE\n- Los ${aula.examenes} exámenes programados deberán ser reasignados a otras aulas\n- Afectará la disponibilidad de espacios\n\nNo podrá recuperar los datos una vez eliminados.`);
      
      if (confirmar) {
        // Segunda confirmación para mayor seguridad
        const confirmarFinal = confirm(`ÚLTIMA ADVERTENCIA\n\n¿Realmente desea eliminar el aula "${aula.codigo} - ${aula.nombre}"?\n\nEscriba "ELIMINAR" para confirmar.`);
        
        if (confirmarFinal) {
          const texto = prompt('Escriba "ELIMINAR" para confirmar la eliminación:');
          if (texto === 'ELIMINAR') {
            alert(`✅ Aula "${aula.codigo} - ${aula.nombre}" eliminada correctamente.\n\nSe deben reasignar ${aula.examenes} exámenes a otras aulas.`);
            // Aquí redirigir a la lista de aulas
            // window.location.href = 'administracion_aulas.html';
          } else if (texto !== null) {
            alert('❌ Texto incorrecto. Eliminación cancelada.');
          }
        } else {
          alert('🔄 Eliminación cancelada.');
        }
      } else {
        alert('🔄 Eliminación cancelada.');
      }
    }

    // Cancelar
    function cancelar() {
      const confirmar = confirm('¿Estás seguro de que deseas cancelar la eliminación?');
      if (confirmar) {
        alert('🔄 Eliminación cancelada. El aula no ha sido modificada.');
      }
    }

    // Eventos
    btnConfirmar.addEventListener('click', confirmarEliminacion);
    btnCancelar.addEventListener('click', cancelar);
  </script>

</body>
</html>
