<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Administración de Grados Académicos</title>

  <style>
    *{
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body{
      background: #e9e9e9;
      font-family: "Courier New", monospace;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .contenedor{
      width: 1100px;
      background: #ececec;
      padding: 20px;
    }

    .titulo{
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      text-decoration: underline;
      margin-bottom: 25px;
      letter-spacing: 1px;
    }

    /* Tabla de grados */
    .tabla-grados{
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 25px;
      background: white;
    }

    .tabla-grados th,
    .tabla-grados td{
      border: 1px solid #bdbdbd;
      padding: 12px 10px;
      text-align: left;
    }

    .tabla-grados th{
      background: #dfe7ef;
      font-weight: bold;
      font-size: 15px;
    }

    .tabla-grados td{
      font-size: 14px;
    }

    .tabla-grados tr{
      transition: background 0.2s;
    }

    .tabla-grados tr:hover{
      background: #f0f0f0;
    }

    .tabla-grados tr.seleccionado{
      background: #b8d4f0;
    }

    .btn-editar{
      background: #2d89ef;
      color: white;
      border: none;
      padding: 5px 15px;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      border-radius: 3px;
    }

    .btn-editar:hover{
      background: #1e6bc7;
    }

    /* Checkbox de selección */
    .checkbox-grado{
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    /* Fila de búsqueda */
    .fila-busqueda{
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 15px;
      margin-bottom: 25px;
    }

    .label-buscar{
      font-size: 16px;
      font-weight: bold;
    }

    .input-buscar{
      padding: 8px 12px;
      font-family: inherit;
      font-size: 14px;
      border: 1px solid #bdbdbd;
      background: white;
      width: 250px;
    }

    .btn-filtrar{
      background: #2d89ef;
      color: white;
      border: none;
      padding: 8px 20px;
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
      border-radius: 3px;
    }

    .btn-filtrar:hover{
      background: #1e6bc7;
    }

    /* Botones de acción */
    .botones-accion{
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 25px;
      flex-wrap: wrap;
    }

    .btn{
      min-width: 160px;
      padding: 12px 20px;
      border-radius: 4px;
      font-size: 15px;
      font-family: inherit;
      cursor: pointer;
      border: 1px solid #999;
      font-weight: bold;
    }

    .btn-crear{
      background: #28a745;
      color: white;
      border: 1px solid #1e7e34;
    }

    .btn-crear:hover{
      background: #218838;
    }

    .btn-importar{
      background: #2d89ef;
      color: white;
      border: 1px solid #1d5faa;
    }

    .btn-importar:hover{
      background: #1e6bc7;
    }

    .btn-eliminar{
      background: #dc3545;
      color: white;
      border: 1px solid #a71d2a;
    }

    .btn-eliminar:hover{
      background: #c82333;
    }

    .btn-salir{
      background: #f3f0ec;
      color: black;
    }

    .btn-salir:hover{
      background: #e3dfda;
    }

    hr{
      border: none;
      border-top: 2px solid #cfcfcf;
      margin: 20px 0;
    }
  </style>
</head>

<body>

  <div class="contenedor">

    <h1 class="titulo">ADMINISTRACIÓN DE GRADOS ACADÉMICOS</h1>

    <!-- Tabla de grados -->
    <table class="tabla-grados" id="tablaGrados">
      <thead>
        <tr>
          <th style="width: 40px;"><input type="checkbox" id="chkSeleccionarTodos"></th>
          <th>CÓDIGO</th>
          <th>NOMBRE</th>
          <th>DESCRIPCIÓN</th>
          <th style="width: 100px;">ACCIÓN</th>
        </tr>
      </thead>
      <tbody id="cuerpoTabla">
        <!-- Datos dinámicos -->
      </tbody>
    </table>

    <!-- Fila de búsqueda -->
    <div class="fila-busqueda">
      <span class="label-buscar">🔍 BÚSCAR:</span>
      <input type="text" id="inputBuscar" class="input-buscar" placeholder="Código o nombre...">
      <button class="btn-filtrar" id="btnFiltrar">Filtrar</button>
    </div>

    <!-- Botones de acción -->
    <div class="botones-accion">
      <button class="btn btn-crear" id="btnCrear">➕ Crear nuevo</button>
      <button class="btn btn-importar" id="btnImportar">📎 Importar grados</button>
      <button class="btn btn-eliminar" id="btnEliminar">🗑️ Eliminar seleccionado</button>
      <button class="btn btn-salir" id="btnSalir">🚪 Salir</button>
    </div>

  </div>

  <script>
    // Datos de grados
    let grados = [
      { id: 1, codigo: 'GII', nombre: 'Ingeniería Informática', descripcion: 'Grado en Ingeniería Informática', seleccionado: false },
      { id: 2, codigo: 'GIOI', nombre: 'Ingeniería Industrial', descripcion: 'Grado en Ingeniería Industrial', seleccionado: false },
      { id: 3, codigo: 'GPSI', nombre: 'Psicología', descripcion: 'Grado en Psicología', seleccionado: false },
      { id: 4, codigo: 'GADE', nombre: 'Administración de Empresas', descripcion: 'Grado en Administración de Empresas', seleccionado: false }
    ];

    let gradosOriginales = JSON.parse(JSON.stringify(grados));
    let filtroActivo = '';

    // Elementos del DOM
    const cuerpoTabla = document.getElementById('cuerpoTabla');
    const chkSeleccionarTodos = document.getElementById('chkSeleccionarTodos');
    const inputBuscar = document.getElementById('inputBuscar');
    const btnFiltrar = document.getElementById('btnFiltrar');

    // Función para renderizar la tabla
    function renderizarTabla() {
      cuerpoTabla.innerHTML = '';
      
      let gradosMostrar = grados;
      if (filtroActivo) {
        const filtroLower = filtroActivo.toLowerCase();
        gradosMostrar = grados.filter(grado => 
          grado.codigo.toLowerCase().includes(filtroLower) || 
          grado.nombre.toLowerCase().includes(filtroLower)
        );
      }
      
      if (gradosMostrar.length === 0) {
        const fila = document.createElement('tr');
        fila.innerHTML = `<td colspan="5" style="text-align: center;">No hay grados disponibles</td>`;
        cuerpoTabla.appendChild(fila);
        return;
      }
      
      gradosMostrar.forEach(grado => {
        const fila = document.createElement('tr');
        if (grado.seleccionado) {
          fila.classList.add('seleccionado');
        }
        
        fila.innerHTML = `
          <td style="text-align: center;">
            <input type="checkbox" class="checkbox-grado" data-id="${grado.id}" ${grado.seleccionado ? 'checked' : ''}>
          </td>
          <td><strong>${grado.codigo}</strong></td>
          <td>${grado.nombre}</td>
          <td>${grado.descripcion}</td>
          <td>
            <button class="btn-editar" data-id="${grado.id}">Editar</button>
          </td>
        `;
        
        cuerpoTabla.appendChild(fila);
      });
      
      // Agregar event listeners a los checkboxes
      document.querySelectorAll('.checkbox-grado').forEach(chk => {
        chk.addEventListener('change', (e) => {
          const id = parseInt(e.target.getAttribute('data-id'));
          const grado = grados.find(g => g.id === id);
          if (grado) {
            grado.seleccionado = e.target.checked;
            actualizarSeleccionarTodos();
            renderizarTabla();
          }
        });
      });
      
      // Agregar event listeners a los botones editar
      document.querySelectorAll('.btn-editar').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = parseInt(e.target.getAttribute('data-id'));
          editarGrado(id);
        });
      });
    }
    
    // Actualizar checkbox "Seleccionar todos"
    function actualizarSeleccionarTodos() {
      const gradosFiltrados = filtroActivo ? 
        grados.filter(g => g.codigo.toLowerCase().includes(filtroActivo.toLowerCase()) || 
                          g.nombre.toLowerCase().includes(filtroActivo.toLowerCase())) : grados;
      
      const todosSeleccionados = gradosFiltrados.length > 0 && gradosFiltrados.every(g => g.seleccionado);
      chkSeleccionarTodos.checked = todosSeleccionados;
    }
    
    // Seleccionar/Deseleccionar todos
    function seleccionarTodos() {
      const seleccionar = chkSeleccionarTodos.checked;
      
      let gradosAAfectar = grados;
      if (filtroActivo) {
        const filtroLower = filtroActivo.toLowerCase();
        gradosAAfectar = grados.filter(g => 
          g.codigo.toLowerCase().includes(filtroLower) || 
          g.nombre.toLowerCase().includes(filtroLower)
        );
      }
      
      gradosAAfectar.forEach(grado => {
        grado.seleccionado = seleccionar;
      });
      
      renderizarTabla();
    }
    
    // Editar grado
    function editarGrado(id) {
      const grado = grados.find(g => g.id === id);
      if (grado) {
        const nuevoNombre = prompt('Editar nombre del grado:', grado.nombre);
        if (nuevoNombre && nuevoNombre.trim()) {
          grado.nombre = nuevoNombre.trim();
          
          const nuevaDescripcion = prompt('Editar descripción:', grado.descripcion);
          if (nuevaDescripcion && nuevaDescripcion.trim()) {
            grado.descripcion = nuevaDescripcion.trim();
          }
          
          renderizarTabla();
          alert(`✅ Grado "${grado.codigo}" actualizado correctamente.`);
        }
      }
    }
    
    // Filtrar grados
    function filtrarGrados() {
      filtroActivo = inputBuscar.value.trim();
      // Limpiar selecciones al filtrar
      grados.forEach(g => g.seleccionado = false);
      chkSeleccionarTodos.checked = false;
      renderizarTabla();
      
      if (filtroActivo) {
        const resultados = grados.filter(g => 
          g.codigo.toLowerCase().includes(filtroActivo.toLowerCase()) || 
          g.nombre.toLowerCase().includes(filtroActivo.toLowerCase())
        );
        alert(`🔍 Filtro aplicado: "${filtroActivo}"\n\nSe encontraron ${resultados.length} resultado(s).`);
      }
    }
    
    // Crear nuevo grado
    function crearNuevo() {
      const nuevoCodigo = prompt('Ingrese el código del nuevo grado (ej: GNEW):');
      if (!nuevoCodigo || !nuevoCodigo.trim()) return;
      
      const nuevoNombre = prompt('Ingrese el nombre del nuevo grado:');
      if (!nuevoNombre || !nuevoNombre.trim()) return;
      
      const nuevaDescripcion = prompt('Ingrese la descripción del nuevo grado:');
      if (!nuevaDescripcion || !nuevaDescripcion.trim()) return;
      
      // Verificar si el código ya existe
      if (grados.some(g => g.codigo.toLowerCase() === nuevoCodigo.trim().toLowerCase())) {
        alert(`❌ El código "${nuevoCodigo}" ya existe. Por favor, use otro código.`);
        return;
      }
      
      const nuevoId = Math.max(...grados.map(g => g.id), 0) + 1;
      
      grados.push({
        id: nuevoId,
        codigo: nuevoCodigo.trim().toUpperCase(),
        nombre: nuevoNombre.trim(),
        descripcion: nuevaDescripcion.trim(),
        seleccionado: false
      });
      
      gradosOriginales = JSON.parse(JSON.stringify(grados));
      renderizarTabla();
      alert(`✅ Grado "${nuevoCodigo}" creado correctamente.`);
    }
    
    // Importar grados
    function importarGrados() {
      alert('📎 Función de importación de grados\n\nSe abrirá el asistente para importar grados desde archivo CSV o Excel.');
      // Aquí se abriría la pantalla de importación
    }
    
    // Eliminar seleccionado
    function eliminarSeleccionado() {
      const seleccionados = grados.filter(g => g.seleccionado);
      
      if (seleccionados.length === 0) {
        alert('⚠️ No hay ningún grado seleccionado para eliminar.');
        return;
      }
      
      let mensaje = '¿Estás seguro de que deseas eliminar los siguientes grados?\n\n';
      seleccionados.forEach(g => {
        mensaje += `• ${g.codigo} - ${g.nombre}\n`;
      });
      mensaje += `\n⚠️ Esta acción no se puede deshacer.`;
      
      const confirmar = confirm(mensaje);
      if (confirmar) {
        grados = grados.filter(g => !g.seleccionado);
        gradosOriginales = JSON.parse(JSON.stringify(grados));
        chkSeleccionarTodos.checked = false;
        renderizarTabla();
        alert(`✅ ${seleccionados.length} grado(s) eliminado(s) correctamente.`);
      }
    }
    
    // Salir
    function salir() {
      const confirmar = confirm('¿Estás seguro de que deseas salir?');
      if (confirmar) {
        alert('👋 Saliendo del administrador de grados...');
        // window.location.href = 'index.html';
      }
    }
    
    // Eventos
    chkSeleccionarTodos.addEventListener('change', seleccionarTodos);
    btnFiltrar.addEventListener('click', filtrarGrados);
    document.getElementById('btnCrear').addEventListener('click', crearNuevo);
    document.getElementById('btnImportar').addEventListener('click', importarGrados);
    document.getElementById('btnEliminar').addEventListener('click', eliminarSeleccionado);
    document.getElementById('btnSalir').addEventListener('click', salir);
    
    // Permitir filtrar con Enter
    inputBuscar.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        filtrarGrados();
      }
    });
    
    // Inicializar
    renderizarTabla();
  </script>

</body>
</html>
