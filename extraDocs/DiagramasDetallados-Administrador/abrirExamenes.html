<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Administración de Exámenes</title>

  <style>
    *{
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body{
      background: #e9e9e9;
      font-family: "Courier New", monospace;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .contenedor{
      width: 1300px;
      background: #ececec;
      padding: 20px;
    }

    .titulo{
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      text-decoration: underline;
      margin-bottom: 25px;
      letter-spacing: 1px;
    }

    /* Tabla de exámenes */
    .tabla-examenes{
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 25px;
      background: white;
    }

    .tabla-examenes th,
    .tabla-examenes td{
      border: 1px solid #bdbdbd;
      padding: 10px 8px;
      text-align: left;
    }

    .tabla-examenes th{
      background: #dfe7ef;
      font-weight: bold;
      font-size: 14px;
    }

    .tabla-examenes td{
      font-size: 13px;
    }

    .tabla-examenes tr{
      transition: background 0.2s;
    }

    .tabla-examenes tr:hover{
      background: #f0f0f0;
    }

    .tabla-examenes tr.seleccionado{
      background: #b8d4f0;
    }

    .btn-editar{
      background: #2d89ef;
      color: white;
      border: none;
      padding: 5px 15px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      border-radius: 3px;
    }

    .btn-editar:hover{
      background: #1e6bc7;
    }

    /* Checkbox de selección */
    .checkbox-examen{
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    /* Fila de búsqueda */
    .fila-busqueda{
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 15px;
      margin-bottom: 25px;
    }

    .label-buscar{
      font-size: 16px;
      font-weight: bold;
    }

    .input-buscar{
      padding: 8px 12px;
      font-family: inherit;
      font-size: 14px;
      border: 1px solid #bdbdbd;
      background: white;
      width: 250px;
    }

    .btn-filtrar{
      background: #2d89ef;
      color: white;
      border: none;
      padding: 8px 20px;
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
      border-radius: 3px;
    }

    .btn-filtrar:hover{
      background: #1e6bc7;
    }

    /* Botones de acción */
    .botones-accion{
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 25px;
      flex-wrap: wrap;
    }

    .btn{
      min-width: 180px;
      padding: 12px 20px;
      border-radius: 4px;
      font-size: 15px;
      font-family: inherit;
      cursor: pointer;
      border: 1px solid #999;
      font-weight: bold;
    }

    .btn-crear{
      background: #28a745;
      color: white;
      border: 1px solid #1e7e34;
    }

    .btn-crear:hover{
      background: #218838;
    }

    .btn-eliminar{
      background: #dc3545;
      color: white;
      border: 1px solid #a71d2a;
    }

    .btn-eliminar:hover{
      background: #c82333;
    }

    .btn-salir{
      background: #f3f0ec;
      color: black;
    }

    .btn-salir:hover{
      background: #e3dfda;
    }
  </style>
</head>

<body>

  <div class="contenedor">

    <h1 class="titulo">ADMINISTRACIÓN DE EXÁMENES</h1>

    <!-- Tabla de exámenes -->
    <table class="tabla-examenes" id="tablaExamenes">
      <thead>
        <tr>
          <th style="width: 40px;"><input type="checkbox" id="chkSeleccionarTodos"></th>
          <th>CÓDIGO</th>
          <th>ASIGNATURA</th>
          <th>FECHA</th>
          <th>HORA</th>
          <th>AULA</th>
          <th>PROFESOR</th>
          <th style="width: 100px;">ACCIÓN</th>
        </tr>
      </thead>
      <tbody id="cuerpoTabla">
        <!-- Datos dinámicos -->
      </tbody>
    </table>

    <!-- Fila de búsqueda -->
    <div class="fila-busqueda">
      <span class="label-buscar">🔍 BUSCAR:</span>
      <input type="text" id="inputBuscar" class="input-buscar" placeholder="Código, asignatura o profesor...">
      <button class="btn-filtrar" id="btnFiltrar">Filtrar</button>
    </div>

    <!-- Botones de acción -->
    <div class="botones-accion">
      <button class="btn btn-crear" id="btnCrear">➕ Crear nuevo</button>
      <button class="btn btn-eliminar" id="btnEliminar">🗑️ Eliminar seleccionado</button>
      <button class="btn btn-salir" id="btnSalir">🚪 Salir</button>
    </div>

  </div>

  <script>
    // Datos de exámenes
    let examenes = [
      { id: 1, codigo: 'EX001', asignatura: 'Programación I', fecha: '2026-01-15', hora: '08:30', aula: '-2.6', profesor: 'Manuel Masías', seleccionado: false },
      { id: 2, codigo: 'EX002', asignatura: 'Bases de Datos I', fecha: '2026-01-16', hora: '11:30', aula: '-2.2', profesor: 'Lázaro Hernández', seleccionado: false },
      { id: 3, codigo: 'EX003', asignatura: 'Estructuras de Datos I', fecha: '2026-01-19', hora: '14:30', aula: '-2.4', profesor: 'Manuel Masías', seleccionado: false },
      { id: 4, codigo: 'EX004', asignatura: 'Expresión Gráfica', fecha: '2026-01-20', hora: '17:30', aula: '1.2', profesor: 'Carlos Galiano', seleccionado: false }
    ];

    let examenesOriginales = JSON.parse(JSON.stringify(examenes));
    let filtroActivo = '';

    // Elementos del DOM
    const cuerpoTabla = document.getElementById('cuerpoTabla');
    const chkSeleccionarTodos = document.getElementById('chkSeleccionarTodos');
    const inputBuscar = document.getElementById('inputBuscar');
    const btnFiltrar = document.getElementById('btnFiltrar');

    // Función para formatear fecha (YYYY-MM-DD a DD/MM/YYYY)
    function formatearFecha(fecha) {
      const partes = fecha.split('-');
      if (partes.length === 3) {
        return `${partes[2]}/${partes[1]}/${partes[0]}`;
      }
      return fecha;
    }

    // Función para renderizar la tabla
    function renderizarTabla() {
      cuerpoTabla.innerHTML = '';
      
      let examenesMostrar = examenes;
      if (filtroActivo) {
        const filtroLower = filtroActivo.toLowerCase();
        examenesMostrar = examenes.filter(ex => 
          ex.codigo.toLowerCase().includes(filtroLower) || 
          ex.asignatura.toLowerCase().includes(filtroLower) ||
          ex.profesor.toLowerCase().includes(filtroLower)
        );
      }
      
      if (examenesMostrar.length === 0) {
        const fila = document.createElement('tr');
        fila.innerHTML = `<td colspan="8" style="text-align: center;">No hay exámenes disponibles</td>`;
        cuerpoTabla.appendChild(fila);
        return;
      }
      
      examenesMostrar.forEach(examen => {
        const fila = document.createElement('tr');
        if (examen.seleccionado) {
          fila.classList.add('seleccionado');
        }
        
        fila.innerHTML = `
          <td style="text-align: center;">
            <input type="checkbox" class="checkbox-examen" data-id="${examen.id}" ${examen.seleccionado ? 'checked' : ''}>
           </td>
          <td><strong>${examen.codigo}</strong></td>
          <td>${examen.asignatura}</td>
          <td>${formatearFecha(examen.fecha)}</td>
          <td>${examen.hora}</td>
          <td>${examen.aula}</td>
          <td>${examen.profesor}</td>
          <td>
            <button class="btn-editar" data-id="${examen.id}">Editar</button>
          </td>
        `;
        
        cuerpoTabla.appendChild(fila);
      });
      
      // Agregar event listeners a los checkboxes
      document.querySelectorAll('.checkbox-examen').forEach(chk => {
        chk.addEventListener('change', (e) => {
          const id = parseInt(e.target.getAttribute('data-id'));
          const examen = examenes.find(ex => ex.id === id);
          if (examen) {
            examen.seleccionado = e.target.checked;
            actualizarSeleccionarTodos();
            renderizarTabla();
          }
        });
      });
      
      // Agregar event listeners a los botones editar
      document.querySelectorAll('.btn-editar').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = parseInt(e.target.getAttribute('data-id'));
          editarExamen(id);
        });
      });
    }
    
    // Actualizar checkbox "Seleccionar todos"
    function actualizarSeleccionarTodos() {
      const examenesFiltrados = filtroActivo ? 
        examenes.filter(ex => 
          ex.codigo.toLowerCase().includes(filtroActivo.toLowerCase()) || 
          ex.asignatura.toLowerCase().includes(filtroActivo.toLowerCase()) ||
          ex.profesor.toLowerCase().includes(filtroActivo.toLowerCase())
        ) : examenes;
      
      const todosSeleccionados = examenesFiltrados.length > 0 && examenesFiltrados.every(ex => ex.seleccionado);
      chkSeleccionarTodos.checked = todosSeleccionados;
    }
    
    // Seleccionar/Deseleccionar todos
    function seleccionarTodos() {
      const seleccionar = chkSeleccionarTodos.checked;
      
      let examenesAAfectar = examenes;
      if (filtroActivo) {
        const filtroLower = filtroActivo.toLowerCase();
        examenesAAfectar = examenes.filter(ex => 
          ex.codigo.toLowerCase().includes(filtroLower) || 
          ex.asignatura.toLowerCase().includes(filtroLower) ||
          ex.profesor.toLowerCase().includes(filtroLower)
        );
      }
      
      examenesAAfectar.forEach(examen => {
        examen.seleccionado = seleccionar;
      });
      
      renderizarTabla();
    }
    
    // Editar examen
    function editarExamen(id) {
      const examen = examenes.find(ex => ex.id === id);
      if (examen) {
        let mensaje = '✏️ EDITAR EXAMEN\n\n';
        mensaje += `Código: ${examen.codigo}\n`;
        mensaje += `Asignatura: ${examen.asignatura}\n\n`;
        mensaje += `Deja en blanco los campos que no quieras modificar.\n\n`;
        
        const nuevaFecha = prompt(mensaje + 'Nueva fecha (YYYY-MM-DD):', examen.fecha);
        if (nuevaFecha && nuevaFecha.trim()) {
          examen.fecha = nuevaFecha.trim();
        }
        
        const nuevaHora = prompt('Nueva hora (HH:MM):', examen.hora);
        if (nuevaHora && nuevaHora.trim()) {
          examen.hora = nuevaHora.trim();
        }
        
        const nuevaAula = prompt('Nueva aula:', examen.aula);
        if (nuevaAula && nuevaAula.trim()) {
          examen.aula = nuevaAula.trim();
        }
        
        const nuevoProfesor = prompt('Nuevo profesor:', examen.profesor);
        if (nuevoProfesor && nuevoProfesor.trim()) {
          examen.profesor = nuevoProfesor.trim();
        }
        
        renderizarTabla();
        alert(`✅ Examen "${examen.codigo}" actualizado correctamente.`);
      }
    }
    
    // Filtrar exámenes
    function filtrarExamenes() {
      filtroActivo = inputBuscar.value.trim();
      // Limpiar selecciones al filtrar
      examenes.forEach(ex => ex.seleccionado = false);
      chkSeleccionarTodos.checked = false;
      renderizarTabla();
      
      if (filtroActivo) {
        const resultados = examenes.filter(ex => 
          ex.codigo.toLowerCase().includes(filtroActivo.toLowerCase()) || 
          ex.asignatura.toLowerCase().includes(filtroActivo.toLowerCase()) ||
          ex.profesor.toLowerCase().includes(filtroActivo.toLowerCase())
        );
        alert(`🔍 Filtro aplicado: "${filtroActivo}"\n\nSe encontraron ${resultados.length} resultado(s).`);
      }
    }
    
    // Crear nuevo examen
    function crearNuevo() {
      const nuevoCodigo = prompt('Ingrese el código del nuevo examen (ej: EX005):');
      if (!nuevoCodigo || !nuevoCodigo.trim()) return;
      
      // Verificar si el código ya existe
      if (examenes.some(ex => ex.codigo.toLowerCase() === nuevoCodigo.trim().toLowerCase())) {
        alert(`❌ El código "${nuevoCodigo}" ya existe. Por favor, use otro código.`);
        return;
      }
      
      const nuevaAsignatura = prompt('Ingrese la asignatura:');
      if (!nuevaAsignatura || !nuevaAsignatura.trim()) return;
      
      const nuevaFecha = prompt('Ingrese la fecha (YYYY-MM-DD):');
      if (!nuevaFecha || !nuevaFecha.trim()) return;
      
      const nuevaHora = prompt('Ingrese la hora (HH:MM):');
      if (!nuevaHora || !nuevaHora.trim()) return;
      
      const nuevaAula = prompt('Ingrese el aula:');
      if (!nuevaAula || !nuevaAula.trim()) return;
      
      const nuevoProfesor = prompt('Ingrese el profesor:');
      if (!nuevoProfesor || !nuevoProfesor.trim()) return;
      
      const nuevoId = Math.max(...examenes.map(ex => ex.id), 0) + 1;
      
      examenes.push({
        id: nuevoId,
        codigo: nuevoCodigo.trim().toUpperCase(),
        asignatura: nuevaAsignatura.trim(),
        fecha: nuevaFecha.trim(),
        hora: nuevaHora.trim(),
        aula: nuevaAula.trim(),
        profesor: nuevoProfesor.trim(),
        seleccionado: false
      });
      
      examenesOriginales = JSON.parse(JSON.stringify(examenes));
      renderizarTabla();
      alert(`✅ Examen "${nuevoCodigo}" creado correctamente.`);
    }
    
    // Eliminar seleccionado
    function eliminarSeleccionado() {
      const seleccionados = examenes.filter(ex => ex.seleccionado);
      
      if (seleccionados.length === 0) {
        alert('⚠️ No hay ningún examen seleccionado para eliminar.');
        return;
      }
      
      let mensaje = '¿Estás seguro de que deseas eliminar los siguientes exámenes?\n\n';
      seleccionados.forEach(ex => {
        mensaje += `• ${ex.codigo} - ${ex.asignatura}\n`;
        mensaje += `  ${ex.fecha} ${ex.hora} - Aula ${ex.aula}\n`;
      });
      mensaje += `\n⚠️ Esta acción no se puede deshacer.`;
      
      const confirmar = confirm(mensaje);
      if (confirmar) {
        examenes = examenes.filter(ex => !ex.seleccionado);
        examenesOriginales = JSON.parse(JSON.stringify(examenes));
        chkSeleccionarTodos.checked = false;
        renderizarTabla();
        alert(`✅ ${seleccionados.length} examen(es) eliminado(s) correctamente.`);
      }
    }
    
    // Salir
    function salir() {
      const confirmar = confirm('¿Estás seguro de que deseas salir?');
      if (confirmar) {
        alert('👋 Saliendo del administrador de exámenes...');
      }
    }
    
    // Eventos
    chkSeleccionarTodos.addEventListener('change', seleccionarTodos);
    btnFiltrar.addEventListener('click', filtrarExamenes);
    document.getElementById('btnCrear').addEventListener('click', crearNuevo);
    document.getElementById('btnEliminar').addEventListener('click', eliminarSeleccionado);
    document.getElementById('btnSalir').addEventListener('click', salir);
    
    // Permitir filtrar con Enter
    inputBuscar.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        filtrarExamenes();
      }
    });
    
    // Inicializar
    renderizarTabla();
  </script>

</body>
</html>
