<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Administración de Profesores</title>

  <style>
    *{
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body{
      background: #e9e9e9;
      font-family: "Courier New", monospace;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .contenedor{
      width: 1200px;
      background: #ececec;
      padding: 20px;
    }

    .titulo{
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      text-decoration: underline;
      margin-bottom: 25px;
      letter-spacing: 1px;
    }

    /* Tabla de profesores */
    .tabla-profesores{
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 25px;
      background: white;
    }

    .tabla-profesores th,
    .tabla-profesores td{
      border: 1px solid #bdbdbd;
      padding: 10px 8px;
      text-align: left;
    }

    .tabla-profesores th{
      background: #dfe7ef;
      font-weight: bold;
      font-size: 14px;
    }

    .tabla-profesores td{
      font-size: 13px;
    }

    .tabla-profesores tr{
      transition: background 0.2s;
    }

    .tabla-profesores tr:hover{
      background: #f0f0f0;
    }

    .tabla-profesores tr.seleccionado{
      background: #b8d4f0;
    }

    .btn-editar{
      background: #2d89ef;
      color: white;
      border: none;
      padding: 5px 15px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      border-radius: 3px;
    }

    .btn-editar:hover{
      background: #1e6bc7;
    }

    /* Checkbox de selección */
    .checkbox-profesor{
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    /* Fila de búsqueda */
    .fila-busqueda{
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 15px;
      margin-bottom: 25px;
    }

    .label-buscar{
      font-size: 16px;
      font-weight: bold;
    }

    .input-buscar{
      padding: 8px 12px;
      font-family: inherit;
      font-size: 14px;
      border: 1px solid #bdbdbd;
      background: white;
      width: 250px;
    }

    .btn-filtrar{
      background: #2d89ef;
      color: white;
      border: none;
      padding: 8px 20px;
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
      border-radius: 3px;
    }

    .btn-filtrar:hover{
      background: #1e6bc7;
    }

    /* Botones de acción */
    .botones-accion{
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 25px;
      flex-wrap: wrap;
    }

    .btn{
      min-width: 180px;
      padding: 12px 20px;
      border-radius: 4px;
      font-size: 15px;
      font-family: inherit;
      cursor: pointer;
      border: 1px solid #999;
      font-weight: bold;
    }

    .btn-crear{
      background: #28a745;
      color: white;
      border: 1px solid #1e7e34;
    }

    .btn-crear:hover{
      background: #218838;
    }

    .btn-importar{
      background: #2d89ef;
      color: white;
      border: 1px solid #1d5faa;
    }

    .btn-importar:hover{
      background: #1e6bc7;
    }

    .btn-eliminar{
      background: #dc3545;
      color: white;
      border: 1px solid #a71d2a;
    }

    .btn-eliminar:hover{
      background: #c82333;
    }

    .btn-salir{
      background: #f3f0ec;
      color: black;
    }

    .btn-salir:hover{
      background: #e3dfda;
    }
  </style>
</head>

<body>

  <div class="contenedor">

    <h1 class="titulo">ADMINISTRACIÓN DE PROFESORES</h1>

    <!-- Tabla de profesores -->
    <table class="tabla-profesores" id="tablaProfesores">
      <thead>
        <tr>
          <th style="width: 40px;"><input type="checkbox" id="chkSeleccionarTodos"></th>
          <th>CÓDIGO</th>
          <th>NOMBRE</th>
          <th>EMAIL</th>
          <th>DEPARTAMENTO</th>
          <th style="width: 100px;">ACCIÓN</th>
        </tr>
      </thead>
      <tbody id="cuerpoTabla">
        <!-- Datos dinámicos -->
      </tbody>
    </table>

    <!-- Fila de búsqueda -->
    <div class="fila-busqueda">
      <span class="label-buscar">🔍 BUSCAR:</span>
      <input type="text" id="inputBuscar" class="input-buscar" placeholder="Código, nombre o email...">
      <button class="btn-filtrar" id="btnFiltrar">Filtrar</button>
    </div>

    <!-- Botones de acción -->
    <div class="botones-accion">
      <button class="btn btn-crear" id="btnCrear">➕ Crear nuevo</button>
      <button class="btn btn-importar" id="btnImportar">📎 Importar profesores</button>
      <button class="btn btn-eliminar" id="btnEliminar">🗑️ Eliminar seleccionado</button>
      <button class="btn btn-salir" id="btnSalir">🚪 Salir</button>
    </div>

  </div>

  <script>
    // Datos de profesores
    let profesores = [
      { id: 1, codigo: 'PRO001', nombre: 'Manuel Masías', email: 'manuel.masias@uneatlantico.es', departamento: 'Informática', seleccionado: false },
      { id: 2, codigo: 'PRO002', nombre: 'Jorge Crespo', email: 'jorge.crespo@uneatlantico.es', departamento: 'Informática', seleccionado: false },
      { id: 3, codigo: 'PRO003', nombre: 'Javier Bel', email: 'javier.bel@uneatlantico.es', departamento: 'Informática', seleccionado: false },
      { id: 4, codigo: 'PROF004', nombre: 'Daniel Iglesias', email: 'daniel.iglesias@uneatlantico.es', departamento: 'Informática', seleccionado: false }
    ];

    let profesoresOriginales = JSON.parse(JSON.stringify(profesores));
    let filtroActivo = '';

    // Elementos del DOM
    const cuerpoTabla = document.getElementById('cuerpoTabla');
    const chkSeleccionarTodos = document.getElementById('chkSeleccionarTodos');
    const inputBuscar = document.getElementById('inputBuscar');
    const btnFiltrar = document.getElementById('btnFiltrar');

    // Función para renderizar la tabla
    function renderizarTabla() {
      cuerpoTabla.innerHTML = '';
      
      let profesoresMostrar = profesores;
      if (filtroActivo) {
        const filtroLower = filtroActivo.toLowerCase();
        profesoresMostrar = profesores.filter(prof => 
          prof.codigo.toLowerCase().includes(filtroLower) || 
          prof.nombre.toLowerCase().includes(filtroLower) ||
          prof.email.toLowerCase().includes(filtroLower)
        );
      }
      
      if (profesoresMostrar.length === 0) {
        const fila = document.createElement('tr');
        fila.innerHTML = `<td colspan="6" style="text-align: center;">No hay profesores disponibles</td>`;
        cuerpoTabla.appendChild(fila);
        return;
      }
      
      profesoresMostrar.forEach(profesor => {
        const fila = document.createElement('tr');
        if (profesor.seleccionado) {
          fila.classList.add('seleccionado');
        }
        
        fila.innerHTML = `
          <td style="text-align: center;">
            <input type="checkbox" class="checkbox-profesor" data-id="${profesor.id}" ${profesor.seleccionado ? 'checked' : ''}>
           </td>
          <td><strong>${profesor.codigo}</strong></td>
          <td>${profesor.nombre}</td>
          <td>${profesor.email}</td>
          <td>${profesor.departamento}</td>
          <td>
            <button class="btn-editar" data-id="${profesor.id}">Editar</button>
          </td>
        `;
        
        cuerpoTabla.appendChild(fila);
      });
      
      // Agregar event listeners a los checkboxes
      document.querySelectorAll('.checkbox-profesor').forEach(chk => {
        chk.addEventListener('change', (e) => {
          const id = parseInt(e.target.getAttribute('data-id'));
          const profesor = profesores.find(p => p.id === id);
          if (profesor) {
            profesor.seleccionado = e.target.checked;
            actualizarSeleccionarTodos();
            renderizarTabla();
          }
        });
      });
      
      // Agregar event listeners a los botones editar
      document.querySelectorAll('.btn-editar').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = parseInt(e.target.getAttribute('data-id'));
          editarProfesor(id);
        });
      });
    }
    
    // Actualizar checkbox "Seleccionar todos"
    function actualizarSeleccionarTodos() {
      const profesoresFiltrados = filtroActivo ? 
        profesores.filter(p => 
          p.codigo.toLowerCase().includes(filtroActivo.toLowerCase()) || 
          p.nombre.toLowerCase().includes(filtroActivo.toLowerCase()) ||
          p.email.toLowerCase().includes(filtroActivo.toLowerCase())
        ) : profesores;
      
      const todosSeleccionados = profesoresFiltrados.length > 0 && profesoresFiltrados.every(p => p.seleccionado);
      chkSeleccionarTodos.checked = todosSeleccionados;
    }
    
    // Seleccionar/Deseleccionar todos
    function seleccionarTodos() {
      const seleccionar = chkSeleccionarTodos.checked;
      
      let profesoresAAfectar = profesores;
      if (filtroActivo) {
        const filtroLower = filtroActivo.toLowerCase();
        profesoresAAfectar = profesores.filter(p => 
          p.codigo.toLowerCase().includes(filtroLower) || 
          p.nombre.toLowerCase().includes(filtroLower) ||
          p.email.toLowerCase().includes(filtroLower)
        );
      }
      
      profesoresAAfectar.forEach(profesor => {
        profesor.seleccionado = seleccionar;
      });
      
      renderizarTabla();
    }
    
    // Editar profesor
    function editarProfesor(id) {
      const profesor = profesores.find(p => p.id === id);
      if (profesor) {
        let mensaje = '✏️ EDITAR PROFESOR\n\n';
        mensaje += `Código: ${profesor.codigo}\n\n`;
        mensaje += `Deja en blanco los campos que no quieras modificar.\n\n`;
        
        const nuevoNombre = prompt(mensaje + 'Nuevo nombre:', profesor.nombre);
        if (nuevoNombre && nuevoNombre.trim()) {
          profesor.nombre = nuevoNombre.trim();
        }
        
        const nuevoEmail = prompt('Nuevo email:', profesor.email);
        if (nuevoEmail && nuevoEmail.trim()) {
          profesor.email = nuevoEmail.trim();
        }
        
        const nuevoDepartamento = prompt('Nuevo departamento:', profesor.departamento);
        if (nuevoDepartamento && nuevoDepartamento.trim()) {
          profesor.departamento = nuevoDepartamento.trim();
        }
        
        renderizarTabla();
        alert(`✅ Profesor "${profesor.codigo} - ${profesor.nombre}" actualizado correctamente.`);
      }
    }
    
    // Filtrar profesores
    function filtrarProfesores() {
      filtroActivo = inputBuscar.value.trim();
      // Limpiar selecciones al filtrar
      profesores.forEach(p => p.seleccionado = false);
      chkSeleccionarTodos.checked = false;
      renderizarTabla();
      
      if (filtroActivo) {
        const resultados = profesores.filter(p => 
          p.codigo.toLowerCase().includes(filtroActivo.toLowerCase()) || 
          p.nombre.toLowerCase().includes(filtroActivo.toLowerCase()) ||
          p.email.toLowerCase().includes(filtroActivo.toLowerCase())
        );
        alert(`🔍 Filtro aplicado: "${filtroActivo}"\n\nSe encontraron ${resultados.length} resultado(s).`);
      }
    }
    
    // Crear nuevo profesor
    function crearNuevo() {
      const nuevoCodigo = prompt('Ingrese el código del nuevo profesor (ej: PRO005):');
      if (!nuevoCodigo || !nuevoCodigo.trim()) return;
      
      // Verificar si el código ya existe
      if (profesores.some(p => p.codigo.toLowerCase() === nuevoCodigo.trim().toLowerCase())) {
        alert(`❌ El código "${nuevoCodigo}" ya existe. Por favor, use otro código.`);
        return;
      }
      
      const nuevoNombre = prompt('Ingrese el nombre del profesor:');
      if (!nuevoNombre || !nuevoNombre.trim()) return;
      
      const nuevoEmail = prompt('Ingrese el email del profesor:');
      if (!nuevoEmail || !nuevoEmail.trim()) return;
      
      const nuevoDepartamento = prompt('Ingrese el departamento:');
      if (!nuevoDepartamento || !nuevoDepartamento.trim()) return;
      
      const nuevoId = Math.max(...profesores.map(p => p.id), 0) + 1;
      
      profesores.push({
        id: nuevoId,
        codigo: nuevoCodigo.trim().toUpperCase(),
        nombre: nuevoNombre.trim(),
        email: nuevoEmail.trim(),
        departamento: nuevoDepartamento.trim(),
        seleccionado: false
      });
      
      profesoresOriginales = JSON.parse(JSON.stringify(profesores));
      renderizarTabla();
      alert(`✅ Profesor "${nuevoCodigo} - ${nuevoNombre}" creado correctamente.`);
    }
    
    // Importar profesores
    function importarProfesores() {
      alert('📎 Función de importación de profesores\n\nSe abrirá el asistente para importar profesores desde archivo CSV o Excel.');
    }
    
    // Eliminar seleccionado
    function eliminarSeleccionado() {
      const seleccionados = profesores.filter(p => p.seleccionado);
      
      if (seleccionados.length === 0) {
        alert('⚠️ No hay ningún profesor seleccionado para eliminar.');
        return;
      }
      
      let mensaje = '¿Estás seguro de que deseas eliminar los siguientes profesores?\n\n';
      seleccionados.forEach(p => {
        mensaje += `• ${p.codigo} - ${p.nombre}\n`;
        mensaje += `  ${p.email}\n`;
      });
      mensaje += `\n⚠️ Esta acción no se puede deshacer.`;
      
      const confirmar = confirm(mensaje);
      if (confirmar) {
        profesores = profesores.filter(p => !p.seleccionado);
        profesoresOriginales = JSON.parse(JSON.stringify(profesores));
        chkSeleccionarTodos.checked = false;
        renderizarTabla();
        alert(`✅ ${seleccionados.length} profesor(es) eliminado(s) correctamente.`);
      }
    }
    
    // Salir
    function salir() {
      const confirmar = confirm('¿Estás seguro de que deseas salir?');
      if (confirmar) {
        alert('👋 Saliendo del administrador de profesores...');
      }
    }
    
    // Eventos
    chkSeleccionarTodos.addEventListener('change', seleccionarTodos);
    btnFiltrar.addEventListener('click', filtrarProfesores);
    document.getElementById('btnCrear').addEventListener('click', crearNuevo);
    document.getElementById('btnImportar').addEventListener('click', importarProfesores);
    document.getElementById('btnEliminar').addEventListener('click', eliminarSeleccionado);
    document.getElementById('btnSalir').addEventListener('click', salir);
    
    // Permitir filtrar con Enter
    inputBuscar.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        filtrarProfesores();
      }
    });
    
    // Inicializar
    renderizarTabla();
  </script>

</body>
</html>
