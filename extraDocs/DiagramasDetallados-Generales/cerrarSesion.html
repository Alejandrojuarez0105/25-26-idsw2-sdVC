<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cerrar Sesión - Universidad Europea del Atlántico</title>

  <style>
    *{
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body{
      background: #e9e9e9;
      font-family: "Courier New", monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .contenedor{
      width: 450px;
      background: #ececec;
      padding: 30px;
      border: 1px solid #cfcfcf;
      text-align: center;
    }

    .logo{
      margin-bottom: 20px;
    }

    .logo h1{
      font-size: 32px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .logo .universidad{
      font-size: 12px;
      color: #555;
      margin-top: 5px;
    }

    .titulo{
      font-size: 24px;
      font-weight: bold;
      text-decoration: underline;
      margin-bottom: 25px;
      letter-spacing: 1px;
    }

    .mensaje{
      font-size: 16px;
      margin-bottom: 25px;
      line-height: 1.5;
      color: #333;
    }

    .mensaje p{
      margin-bottom: 10px;
    }

    .info-sesion{
      background: #e7f3ff;
      padding: 12px;
      margin-bottom: 25px;
      border-left: 4px solid #2d89ef;
      font-size: 13px;
      text-align: left;
    }

    .info-sesion strong{
      display: block;
      margin-bottom: 5px;
    }

    .botones{
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .btn{
      min-width: 150px;
      padding: 12px 20px;
      border-radius: 4px;
      font-size: 16px;
      font-family: inherit;
      cursor: pointer;
      border: 1px solid #999;
      font-weight: bold;
    }

    .btn-cerrar{
      background: #dc3545;
      color: white;
      border: 1px solid #a71d2a;
    }

    .btn-cerrar:hover{
      background: #c82333;
    }

    .btn-cancelar{
      background: #f3f0ec;
      color: black;
    }

    .btn-cancelar:hover{
      background: #e3dfda;
    }

    .footer{
      margin-top: 25px;
      font-size: 11px;
      color: #666;
    }
  </style>
</head>

<body>

  <div class="contenedor">

    <div class="logo">
      <h1>UE</h1>
      <div class="universidad">Universidad Europea del Atlántico</div>
    </div>

    <div class="titulo">Cerrar Sesión</div>

    <div class="mensaje">
      <p>¿Está seguro de que desea cerrar la sesión actual?</p>
      <p>Será redirigido a la página de inicio de sesión.</p>
    </div>

    <div class="info-sesion" id="infoSesion">
      <strong>👤 Sesión actual:</strong>
      <span id="infoUsuario">Cargando...</span>
    </div>

    <div class="botones">
      <button class="btn btn-cancelar" id="btnCancelar">❌ Cancelar</button>
      <button class="btn btn-cerrar" id="btnCerrar">🚪 Sí, Cerrar Sesión</button>
    </div>

    <div class="footer">
      Versión 1.0 · © 2025
    </div>

  </div>

  <script>
    // Elementos del DOM
    const btnCerrar = document.getElementById('btnCerrar');
    const btnCancelar = document.getElementById('btnCancelar');
    const infoUsuarioSpan = document.getElementById('infoUsuario');

    // Obtener información de la sesión actual
    function obtenerInfoSesion() {
      let email = null;
      let rol = null;
      
      // Verificar en localStorage (recordar sesión)
      if (localStorage.getItem('sesionGuardada') === 'true') {
        email = localStorage.getItem('userEmail');
        rol = localStorage.getItem('userRol');
      }
      
      // Verificar en sessionStorage
      if (!email) {
        email = sessionStorage.getItem('userEmail');
        rol = sessionStorage.getItem('userRol');
      }
      
      return { email, rol };
    }

    // Mostrar información de la sesión
    function mostrarInfoSesion() {
      const { email, rol } = obtenerInfoSesion();
      
      if (email && rol) {
        let rolTexto = '';
        switch(rol) {
          case 'administrador':
            rolTexto = 'Administrador';
            break;
          case 'profesor':
            rolTexto = 'Profesor';
            break;
          case 'alumno':
            rolTexto = 'Alumno';
            break;
          default:
            rolTexto = rol;
        }
        infoUsuarioSpan.innerHTML = `${email}<br>🎓 Rol: ${rolTexto}`;
      } else {
        infoUsuarioSpan.innerHTML = 'No hay sesión activa';
      }
    }

    // Cerrar sesión
    function cerrarSesion() {
      const { email, rol } = obtenerInfoSesion();
      
      const confirmar = confirm(`⚠️ CERRAR SESIÓN ⚠️\n\n¿Está ABSOLUTAMENTE seguro de que desea cerrar la sesión?\n\nUsuario: ${email || 'Desconocido'}\nRol: ${rol || 'Desconocido'}\n\nSerá redirigido a la página de inicio de sesión.`);
      
      if (confirmar) {
        // Limpiar localStorage
        localStorage.removeItem('userEmail');
        localStorage.removeItem('userRol');
        localStorage.removeItem('sesionGuardada');
        
        // Limpiar sessionStorage
        sessionStorage.removeItem('userEmail');
        sessionStorage.removeItem('userRol');
        
        // Mensaje de éxito
        alert('✅ Sesión cerrada correctamente.\n\nSerá redirigido a la página de inicio de sesión.');
        
        // Redirigir al login
        // window.location.href = 'iniciar_sesion.html';
        
        console.log(`Sesión cerrada: ${email} (${rol})`);
      }
    }

    // Cancelar
    function cancelar() {
      const confirmar = confirm('¿Estás seguro de que deseas cancelar?\n\nPermanecerás en la sesión actual.');
      if (confirmar) {
        alert('🔙 Operación cancelada. La sesión continúa activa.');
        // window.location.href = 'panel_principal.html';
      }
    }

    // Eventos
    btnCerrar.addEventListener('click', cerrarSesion);
    btnCancelar.addEventListener('click', cancelar);
    
    // Mostrar información de la sesión al cargar
    mostrarInfoSesion();
  </script>

</body>
</html>
